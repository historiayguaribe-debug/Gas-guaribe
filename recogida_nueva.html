<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Nueva recogida - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Nueva recogida</h1>
            <a href="recogidas.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <form id="formRecogida">
            <!-- Comunidad -->
            <div class="form-group">
                <label for="comunidad">Comunidad o cliente</label>
                <input type="text" id="comunidad" list="listaComunidades" placeholder="Escribe o selecciona" required>
                <datalist id="listaComunidades"></datalist>
            </div>

            <!-- Planta -->
            <div class="form-group">
                <label for="planta">Planta de llenado</label>
                <select id="planta" required>
                    <option value="">Selecciona una planta</option>
                </select>
            </div>

            <!-- Cilindros recogidos -->
            <div class="form-group">
                <label>Cilindros recogidos</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Pequeños</label>
                        <input type="number" id="pequenos" min="0" value="0" oninput="actualizarSubtotal()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Medianos</label>
                        <input type="number" id="medianos" min="0" value="0" oninput="actualizarSubtotal()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Grandes</label>
                        <input type="number" id="grandes" min="0" value="0" oninput="actualizarSubtotal()">
                    </div>
                </div>
                <div id="subtotal" class="subtotal-box">Total: 0 cilindros</div>
            </div>

            <!-- Exoneraciones planificadas -->
            <div class="form-group" style="border-top:2px solid #ddd; padding-top:12px;">
                <label style="font-weight:700;">🎓 Exoneraciones planificadas</label>
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;">
                    <div style="flex:1; min-width:120px;">
                        <label style="font-size:12px;">Destino</label>
                        <select id="exo_destino" style="padding:8px;">
                            <option value="comunidad">Comunidad</option>
                            <option value="galpon">Galpón</option>
                        </select>
                    </div>
                    <div style="flex:2; min-width:150px;">
                        <label style="font-size:12px;">Institución</label>
                        <input type="text" id="exo_institucion" placeholder="Nombre de la institución" style="padding:8px;">
                    </div>
                    <div style="flex:1; min-width:60px;">
                        <label style="font-size:12px;">P</label>
                        <input type="number" id="exo_pequenos" min="0" value="0" style="padding:8px; width:100%;">
                    </div>
                    <div style="flex:1; min-width:60px;">
                        <label style="font-size:12px;">M</label>
                        <input type="number" id="exo_medianos" min="0" value="0" style="padding:8px; width:100%;">
                    </div>
                    <div style="flex:1; min-width:60px;">
                        <label style="font-size:12px;">G</label>
                        <input type="number" id="exo_grandes" min="0" value="0" style="padding:8px; width:100%;">
                    </div>
                    <div style="flex:0 0 auto; display:flex; align-items:flex-end;">
                        <button type="button" class="btn-secondary" style="padding:8px 16px; margin:0;" onclick="agregarExoneradoPlanificado()">+</button>
                    </div>
                </div>
                <div id="listaExoneradosPlanificados" style="margin-top:8px; font-size:13px;"></div>
            </div>

            <!-- Fecha y observaciones -->
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha">
            </div>

            <div class="form-group">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" rows="2"></textarea>
            </div>

            <input type="hidden" id="editId" value="">
            <input type="hidden" id="exoneradosPlanificadosData" value="[]">
            <button type="submit" class="btn-primary" id="btnGuardar">Guardar recogida</button>
            <button type="button" class="btn-danger" id="btnEliminar" style="display:none;">Eliminar</button>
        </form>

        <div id="mensaje" style="margin-top:16px; padding:12px; border-radius:8px; display:none;"></div>
    </div>

    <script>
        let exoneradosPlanificados = [];

        // Cargar comunidades y plantas
        function cargarComunidades() {
            const comunidades = obtenerComunidades();
            const datalist = document.getElementById('listaComunidades');
            datalist.innerHTML = '';
            comunidades.forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                datalist.appendChild(option);
            });
        }

        function cargarPlantas() {
            const plantas = obtenerPlantas();
            const select = document.getElementById('planta');
            select.innerHTML = '<option value="">Selecciona una planta</option>';
            plantas.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.nombre;
                select.appendChild(option);
            });
        }

        function actualizarSubtotal() {
            const p = parseInt(document.getElementById('pequenos').value) || 0;
            const m = parseInt(document.getElementById('medianos').value) || 0;
            const g = parseInt(document.getElementById('grandes').value) || 0;
            document.getElementById('subtotal').textContent = `Total: ${p + m + g} cilindros`;
        }

        // Exoneraciones planificadas
        function agregarExoneradoPlanificado() {
            const destino = document.getElementById('exo_destino').value;
            const institucion = document.getElementById('exo_institucion').value.trim();
            const pequenos = parseInt(document.getElementById('exo_pequenos').value) || 0;
            const medianos = parseInt(document.getElementById('exo_medianos').value) || 0;
            const grandes = parseInt(document.getElementById('exo_grandes').value) || 0;

            if (pequenos === 0 && medianos === 0 && grandes === 0) {
                mostrarMensaje('Indica al menos un cilindro exonerado', 'error');
                return;
            }
            if (destino === 'comunidad' && !institucion) {
                mostrarMensaje('Indica la institución', 'error');
                return;
            }

            // Calcular costo estimado
            const plantaId = document.getElementById('planta').value;
            const plantas = obtenerPlantas();
            const planta = plantas.find(p => p.id === plantaId);
            const costos = planta ? planta.costos : { pequeno: 0, mediano: 0, grande: 0 };
            const costo = (pequenos * costos.pequeno) + (medianos * costos.mediano) + (grandes * costos.grande);

            const exo = {
                destino: destino,
                institucion: destino === 'comunidad' ? institucion : 'Galpón',
                pequenos,
                medianos,
                grandes,
                costo: costo
            };

            exoneradosPlanificados.push(exo);
            document.getElementById('exoneradosPlanificadosData').value = JSON.stringify(exoneradosPlanificados);
            renderExoneradosPlanificados();
            
            document.getElementById('exo_institucion').value = '';
            document.getElementById('exo_pequenos').value = 0;
            document.getElementById('exo_medianos').value = 0;
            document.getElementById('exo_grandes').value = 0;
            mostrarMensaje('✅ Exoneración planificada agregada', 'exito');
        }

        function renderExoneradosPlanificados() {
            const container = document.getElementById('listaExoneradosPlanificados');
            if (exoneradosPlanificados.length === 0) {
                container.innerHTML = '<p style="color:#999; font-size:13px;">No hay exoneraciones planificadas</p>';
                return;
            }
            let html = '';
            exoneradosPlanificados.forEach((ex, idx) => {
                const destinoLabel = ex.destino === 'comunidad' ? '🏘️' : '🏭';
                html += `<div style="background:#fff3e0; padding:8px; border-radius:6px; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #ff9800;">
                    <span><strong>${destinoLabel} ${ex.institucion}</strong> - P:${ex.pequenos} M:${ex.medianos} G:${ex.grandes} (costo: $${ex.costo.toFixed(2)})</span>
                    <button type="button" onclick="eliminarExoneradoPlanificado(${idx})" style="background:#d32f2f; color:white; border:none; border-radius:4px; padding:4px 8px;">✕</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        function eliminarExoneradoPlanificado(idx) {
            exoneradosPlanificados.splice(idx, 1);
            document.getElementById('exoneradosPlanificadosData').value = JSON.stringify(exoneradosPlanificados);
            renderExoneradosPlanificados();
        }

        // Cargar datos para edición
        function cargarParaEdicion(id) {
            cargarDatos();
            const recogida = datos.recogidas.find(r => r.id === id);
            if (!recogida) return;
            document.getElementById('comunidad').value = recogida.comunidad || '';
            document.getElementById('planta').value = recogida.planta || '';
            document.getElementById('pequenos').value = recogida.pequenos || 0;
            document.getElementById('medianos').value = recogida.medianos || 0;
            document.getElementById('grandes').value = recogida.grandes || 0;
            document.getElementById('fecha').value = recogida.fecha ? new Date(recogida.fecha).toISOString().slice(0,10) : '';
            document.getElementById('observaciones').value = recogida.observaciones || '';
            document.getElementById('editId').value = recogida.id;
            document.getElementById('btnGuardar').textContent = 'Actualizar recogida';
            document.getElementById('btnEliminar').style.display = 'block';
            if (recogida.exonerados_planificados) {
                exoneradosPlanificados = recogida.exonerados_planificados;
                document.getElementById('exoneradosPlanificadosData').value = JSON.stringify(exoneradosPlanificados);
                renderExoneradosPlanificados();
            }
            actualizarSubtotal();
        }

        // Inicializar
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        if (editId) {
            cargarParaEdicion(parseInt(editId));
        }

        document.addEventListener('DOMContentLoaded', function() {
            cargarComunidades();
            cargarPlantas();
            if (!document.getElementById('fecha').value) {
                document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
            }
            actualizarSubtotal();
        });

        // Guardar recogida
        document.getElementById('formRecogida').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('editId').value);
            const comunidad = document.getElementById('comunidad').value.trim();
            const planta = document.getElementById('planta').value;
            const pequenos = parseInt(document.getElementById('pequenos').value) || 0;
            const medianos = parseInt(document.getElementById('medianos').value) || 0;
            const grandes = parseInt(document.getElementById('grandes').value) || 0;
            const fecha = document.getElementById('fecha').value;
            const observaciones = document.getElementById('observaciones').value;
            const exonerados = JSON.parse(document.getElementById('exoneradosPlanificadosData').value || '[]');

            if (!comunidad) {
                mostrarMensaje('Indica la comunidad o cliente', 'error');
                return;
            }
            if (!planta) {
                mostrarMensaje('Selecciona una planta', 'error');
                return;
            }
            if (pequenos === 0 && medianos === 0 && grandes === 0) {
                mostrarMensaje('Debes registrar al menos un cilindro', 'error');
                return;
            }

            agregarComunidad(comunidad);

            let resultado;
            if (id) {
                resultado = actualizarRecogida(id, {
                    comunidad,
                    planta,
                    pequenos,
                    medianos,
                    grandes,
                    fecha: fecha ? new Date(fecha).toISOString() : new Date().toISOString(),
                    observaciones,
                    exonerados_planificados: exonerados
                });
                if (resultado) {
                    mostrarMensaje('✅ Recogida actualizada', 'exito');
                } else {
                    mostrarMensaje('❌ Error al actualizar', 'error');
                }
            } else {
                resultado = registrarRecogida(comunidad, planta, pequenos, medianos, grandes, fecha ? new Date(fecha).toISOString() : new Date().toISOString(), observaciones, exonerados);
                if (resultado) {
                    setUltimo('recogida', resultado.id);
                    mostrarMensaje(`✅ Recogida guardada: ${comunidad} (${pequenos+medianos+grandes} cilindros)`, 'exito');
                } else {
                    mostrarMensaje('❌ Error al guardar', 'error');
                }
            }

            if (resultado) {
                document.getElementById('formRecogida').reset();
                document.getElementById('editId').value = '';
                document.getElementById('btnGuardar').textContent = 'Guardar recogida';
                document.getElementById('btnEliminar').style.display = 'none';
                document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
                exoneradosPlanificados = [];
                document.getElementById('exoneradosPlanificadosData').value = '[]';
                renderExoneradosPlanificados();
                actualizarSubtotal();
                cargarComunidades();
                if (window.opener) window.opener.actualizarDashboard();
            }
        });

        document.getElementById('btnEliminar').addEventListener('click', function() {
            const id = parseInt(document.getElementById('editId').value);
            if (!id) return;
            if (confirm('¿Eliminar esta recogida?')) {
                eliminarRecogida(id);
                mostrarMensaje('🗑️ Recogida eliminada', 'exito');
                document.getElementById('formRecogida').reset();
                document.getElementById('editId').value = '';
                document.getElementById('btnGuardar').textContent = 'Guardar recogida';
                document.getElementById('btnEliminar').style.display = 'none';
                document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
                exoneradosPlanificados = [];
                document.getElementById('exoneradosPlanificadosData').value = '[]';
                renderExoneradosPlanificados();
                actualizarSubtotal();
                if (window.opener) window.opener.actualizarDashboard();
            }
        });

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.style.display = 'block';
            msg.style.backgroundColor = tipo === 'exito' ? '#d4edda' : '#f8d7da';
            msg.style.color = tipo === 'exito' ? '#155724' : '#721c24';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
