{% extends "admin_base.html" %}
{% block title %}Asistente IA{% endblock %}
{% block content %}
<h2><i class="fas fa-robot"></i> Asistente Inteligente (Groq)</h2>
<div class="card">
    <div class="card-body" id="chat-box" style="height: 400px; overflow-y: auto; background: #1e293b;">
        <div id="messages"></div>
    </div>
    <div class="card-footer">
        <form id="chat-form" class="d-flex gap-2">
            <!-- ⚠️ IMPORTANTE: Añadir name="pregunta" y mantener id -->
            <input type="text" id="pregunta" name="pregunta" class="form-control" placeholder="Escribe tu pregunta..." required>
            <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>
</div>
<script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('pregunta');
    const messages = document.getElementById('messages');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pregunta = input.value.trim();
        if (!pregunta) return;
        addMessage('Tú', pregunta);
        input.value = '';
        try {
            const resp = await fetch('/asistente/consultar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ pregunta: pregunta })
            });
            if (!resp.ok) {
                const errorText = await resp.text();
                addMessage('Asistente', '❌ Error: ' + errorText);
                return;
            }
            const data = await resp.json();
            addMessage('Asistente', data.respuesta || 'No se recibió respuesta.');
        } catch (error) {
            addMessage('Asistente', '❌ Error de conexión: ' + error.message);
        }
    });

    function addMessage(autor, texto) {
        const div = document.createElement('div');
        div.className = `alert ${autor === 'Tú' ? 'alert-primary' : 'alert-secondary'}`;
        div.innerHTML = `<strong>${autor}:</strong> ${texto}`;
        messages.appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }
</script>
{% endblock %}
