<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 GAS GUARIBE</h1>
            <p class="subtitle"><span id="fechaActual"></span></p>
        </header>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-card clickable" onclick="verDetalle('enRuta')">
                    <span class="stat-number" id="enRuta">0</span>
                    <span class="stat-label">🚛 En ruta a planta</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('llenos')">
                    <span class="stat-number" id="llenos">0</span>
                    <span class="stat-label">🏠 Llenos en almacén</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('vacios')">
                    <span class="stat-number" id="vacios">0</span>
                    <span class="stat-label">📦 Vacíos en resguardo</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('entregados')">
                    <span class="stat-number" id="entregados">0</span>
                    <span class="stat-label">✅ Entregados hoy</span>
                </div>
            </div>

            <div id="ultimaCarga" style="margin:12px 0; padding:12px; background:#f0f4ff; border-radius:8px; text-align:center; font-size:14px; color:#555;">
                Última carga: <span id="ultimaCargaTexto">No hay cargas registradas</span>
            </div>

            <div class="menu-grid">
                <a href="recogidas.html" class="menu-btn">📋 Nueva recogida</a>
                <a href="entregas.html" class="menu-btn">💰 Registrar entrega</a>
                <a href="inventario.html" class="menu-btn">📦 Ver inventario</a>
                <a href="ventas.html" class="menu-btn">🏪 Ventas almacén</a>
                <a href="gastos.html" class="menu-btn">💸 Gastos</a>
                <a href="reportes.html" class="menu-btn">📊 Reportes</a>
                <a href="configuracion.html" class="menu-btn">⚙️ Configurar</a>
            </div>
        </div>

        <footer>
            <p>GAS GUARIBE v2.0</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        // Mostrar fecha actual
        document.getElementById('fechaActual').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            actualizarDashboard();
        });

        // Función para ver detalle (redirige a inventario con filtro)
        function verDetalle(tipo) {
            window.location.href = `inventario.html?filtro=${tipo}`;
        }
    </script>
</body>
</html>
