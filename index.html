<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 GAS GUARIBE</h1>
            <p class="subtitle"><span id="fechaActual"></span></p>
        </header>

        <div class="dashboard">
            <!-- Indicador principal -->
            <div class="stat-principal">
                <span class="stat-number-big" id="totalPendientes">0</span>
                <span class="stat-label-big">📦 Cilindros en almacén</span>
            </div>

            <!-- Indicadores secundarios -->
            <div class="stats">
                <div class="stat-card clickable" onclick="window.location.href='recogida.html'">
                    <span class="stat-number" id="recogidasHoy">0</span>
                    <span class="stat-label">📋 Recogidas hoy</span>
                </div>
                <div class="stat-card clickable" onclick="window.location.href='carga.html'">
                    <span class="stat-number" id="cargasActivas">0</span>
                    <span class="stat-label">🛻 Cargas activas</span>
                </div>
                <div class="stat-card clickable" onclick="window.location.href='entrega.html'">
                    <span class="stat-number" id="entregasHoy">0</span>
                    <span class="stat-label">💰 Entregas hoy</span>
                </div>
                <div class="stat-card clickable" onclick="window.location.href='reportes.html'">
                    <span class="stat-number" id="exoneradosHoy">0</span>
                    <span class="stat-label">🎓 Exonerados hoy</span>
                </div>
            </div>

            <!-- Botones principales -->
            <div class="menu-grid">
                <a href="recogida.html" class="menu-btn primary">📋 Nueva recogida</a>
                <a href="carga.html" class="menu-btn primary">🚛 Armar carga</a>
                <a href="entrega.html" class="menu-btn">💰 Registrar entrega</a>
                <a href="reportes.html" class="menu-btn">📊 Reportes</a>
            </div>
        </div>

        <footer>
            <p>GAS GUARIBE v3.0</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        // Mostrar fecha actual
        document.getElementById('fechaActual').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function actualizarDashboard() {
            cargarDatos();
            const recogidas = datos.recogidas || [];
            const cargas = datos.cargas || [];
            const entregas = datos.entregas || [];

            // Total pendientes (cilindros en almacén)
            let totalPendiente = 0;
            recogidas.forEach(r => {
                const saldo = obtenerSaldoRecogida(r);
                totalPendiente += saldo.total;
            });
            document.getElementById('totalPendientes').textContent = totalPendiente;

            // Recogidas hoy
            const hoy = new Date().toDateString();
            const recogidasHoy = recogidas.filter(r => new Date(r.fecha).toDateString() === hoy);
            document.getElementById('recogidasHoy').textContent = recogidasHoy.length;

            // Cargas activas
            const activas = cargas.filter(c => c.estado === 'activa');
            document.getElementById('cargasActivas').textContent = activas.length;

            // Entregas hoy
            const entregasHoy = entregas.filter(e => new Date(e.fecha).toDateString() === hoy);
            const totalEntregadosHoy = entregasHoy.reduce((sum, e) => sum + e.pequenos + e.medianos + e.grandes, 0);
            document.getElementById('entregasHoy').textContent = totalEntregadosHoy;

            // Exonerados hoy
            let exoneradosHoy = 0;
            entregasHoy.forEach(e => {
                if (e.exonerados) {
                    e.exonerados.forEach(ex => {
                        exoneradosHoy += ex.pequenos + ex.medianos + ex.grandes;
                    });
                }
            });
            document.getElementById('exoneradosHoy').textContent = exoneradosHoy;
        }

        document.addEventListener('DOMContentLoaded', function() {
            actualizarDashboard();
            setInterval(actualizarDashboard, 30000);
        });
    </script>
</body>
</html>
