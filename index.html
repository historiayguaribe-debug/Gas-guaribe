<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 GAS GUARIBE</h1>
            <p class="subtitle"><span id="fechaActual"></span></p>
        </header>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-card clickable" onclick="verDetalle('pendientes')">
                    <span class="stat-number" id="recogidasPendientes">0</span>
                    <span class="stat-label">📋 Recogidas pendientes</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('parciales')">
                    <span class="stat-number" id="recogidasParciales">0</span>
                    <span class="stat-label">📋 Recogidas parciales</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('cargas')">
                    <span class="stat-number" id="cargasActivas">0</span>
                    <span class="stat-label">🛻 Cargas activas</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('entregas')">
                    <span class="stat-number" id="entregasHoy">0</span>
                    <span class="stat-label">✅ Entregas hoy</span>
                </div>
            </div>

            <div id="resumenPendientes" style="margin:12px 0; padding:12px; background:#fff3e0; border-radius:8px; font-size:14px; color:#e65100;">
                <strong>📦 Pendientes de enviar a planta:</strong> <span id="totalPendientes">0</span> cilindros
            </div>

            <div class="menu-grid">
                <a href="recogida_nueva.html" class="menu-btn">📋 Nueva recogida</a>
                <a href="cargas.html" class="menu-btn">🛻 Armar carga</a>
                <a href="entregas.html" class="menu-btn">💰 Registrar entrega</a>
                <a href="inventario.html" class="menu-btn">📦 Ver inventario</a>
                <a href="ventas.html" class="menu-btn">🏪 Ventas almacén</a>
                <a href="gastos.html" class="menu-btn">💸 Gastos</a>
                <a href="reportes.html" class="menu-btn">📊 Reportes</a>
                <a href="configuracion.html" class="menu-btn">⚙️ Configurar</a>
            </div>
        </div>

        <footer>
            <p>GAS GUARIBE v2.1</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('fechaActual').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function actualizarDashboard() {
            cargarDatos();
            const recogidas = datos.recogidas || [];
            const cargas = datos.cargas || [];
            const entregas = datos.entregas || [];

            document.getElementById('recogidasPendientes').textContent = recogidas.filter(r => r.estado === 'pendiente').length;
            document.getElementById('recogidasParciales').textContent = recogidas.filter(r => r.estado === 'parcial').length;
            document.getElementById('cargasActivas').textContent = cargas.filter(c => c.estado === 'activa').length;

            const hoy = new Date().toDateString();
            const entregasHoy = entregas.filter(e => new Date(e.fecha).toDateString() === hoy);
            const totalEntregadosHoy = entregasHoy.reduce((sum, e) => sum + e.pequenos + e.medianos + e.grandes, 0);
            document.getElementById('entregasHoy').textContent = totalEntregadosHoy;

            let totalPendiente = 0;
            recogidas.forEach(r => {
                if (r.estado !== 'completa') {
                    const saldo = obtenerSaldoRecogida(r);
                    totalPendiente += saldo.total;
                }
            });
            document.getElementById('totalPendientes').textContent = totalPendiente;
        }

        function verDetalle(tipo) {
            if (tipo === 'cargas') {
                window.location.href = 'cargas.html';
            } else {
                window.location.href = `recogidas.html?filtro=${tipo}`;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            actualizarDashboard();
            setInterval(actualizarDashboard, 30000);
        });
    </script>
</body>
</html>
