<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Inventario - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Inventario</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <div class="form-group">
            <label for="filtroPlanta">Filtrar por planta</label>
            <select id="filtroPlanta" onchange="actualizarInventario()">
                <option value="todas">Todas las plantas</option>
            </select>
        </div>

        <div id="inventario">
            <div class="stats" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="stat-card" style="background:#e3f2fd;">
                    <span class="stat-number" id="totalVacios">0</span>
                    <span class="stat-label">Vacíos en resguardo</span>
                </div>
                <div class="stat-card" style="background:#c8e6c9;">
                    <span class="stat-number" id="totalLlenos">0</span>
                    <span class="stat-label">Llenos en almacén</span>
                </div>
                <div class="stat-card" style="background:#fff9c4;">
                    <span class="stat-number" id="totalEnPlanta">0</span>
                    <span class="stat-label">En planta</span>
                </div>
            </div>

            <h3 style="margin-top:20px;">Desglose por tipo</h3>
            <div style="background:#f5f5f5; padding:12px; border-radius:8px; margin:8px 0;">
                <p><strong>Vacios:</strong> <span id="vaciosP">0</span> P, <span id="vaciosM">0</span> M, <span id="vaciosG">0</span> G</p>
                <p><strong>Llenos:</strong> <span id="llenosP">0</span> P, <span id="llenosM">0</span> M, <span id="llenosG">0</span> G</p>
                <p><strong>En planta:</strong> <span id="plantaP">0</span> P, <span id="plantaM">0</span> M, <span id="plantaG">0</span> G</p>
            </div>

            <button class="btn-secondary" onclick="actualizarInventario()">🔄 Actualizar</button>
        </div>
    </div>

    <script>
        // Cargar plantas para el filtro
        function cargarFiltroPlantas() {
            const plantas = obtenerPlantas();
            const select = document.getElementById('filtroPlanta');
            select.innerHTML = '<option value="todas">Todas las plantas</option>';
            plantas.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.nombre;
                select.appendChild(option);
            });
        }

        function actualizarInventario() {
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos') || '{"recogidas":[],"entregas":[]}');
            const filtroPlanta = document.getElementById('filtroPlanta').value;
            
            let recogidas = datos.recogidas || [];
            let entregas = datos.entregas || [];

            if (filtroPlanta !== 'todas') {
                recogidas = recogidas.filter(r => r.planta === filtroPlanta);
                entregas = entregas.filter(e => e.planta === filtroPlanta);
            }

            let totalRecogidos = { p:0, m:0, g:0 };
            let totalEntregados = { p:0, m:0, g:0 };
            let totalEnPlanta = { p:0, m:0, g:0 };

            recogidas.forEach(r => {
                if (r.estado === 'en_planta') {
                    totalEnPlanta.p += r.pequenos || 0;
                    totalEnPlanta.m += r.medianos || 0;
                    totalEnPlanta.g += r.grandes || 0;
                } else {
                    totalRecogidos.p += r.pequenos || 0;
                    totalRecogidos.m += r.medianos || 0;
                    totalRecogidos.g += r.grandes || 0;
                }
            });

            entregas.forEach(e => {
                totalEntregados.p += e.pequenos || 0;
                totalEntregados.m += e.medianos || 0;
                totalEntregados.g += e.grandes || 0;
            });

            const vacios = {
                p: totalRecogidos.p - totalEntregados.p,
                m: totalRecogidos.m - totalEntregados.m,
                g: totalRecogidos.g - totalEntregados.g
            };

            document.getElementById('totalVacios').textContent = vacios.p + vacios.m + vacios.g;
            document.getElementById('totalLlenos').textContent = totalEntregados.p + totalEntregados.m + totalEntregados.g;
            document.getElementById('totalEnPlanta').textContent = totalEnPlanta.p + totalEnPlanta.m + totalEnPlanta.g;

            document.getElementById('vaciosP').textContent = vacios.p;
            document.getElementById('vaciosM').textContent = vacios.m;
            document.getElementById('vaciosG').textContent = vacios.g;

            document.getElementById('llenosP').textContent = totalEntregados.p;
            document.getElementById('llenosM').textContent = totalEntregados.m;
            document.getElementById('llenosG').textContent = totalEntregados.g;

            document.getElementById('plantaP').textContent = totalEnPlanta.p;
            document.getElementById('plantaM').textContent = totalEnPlanta.m;
            document.getElementById('plantaG').textContent = totalEnPlanta.g;
        }

        document.addEventListener('DOMContentLoaded', function() {
            cargarFiltroPlantas();
            actualizarInventario();
        });
    </script>
</body>
</html>
