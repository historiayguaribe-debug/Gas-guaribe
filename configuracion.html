<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Configuración - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Configuración</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <h3>Precios de venta por tipo de cliente</h3>
        <div style="background:#f5f5f5; padding:12px; border-radius:8px; margin-bottom:16px;">
            <h4>🏘️ Comunidad</h4>
            <div style="display:flex; gap:8px;">
                <div><label style="font-size:12px;">Pequeño $</label><input type="number" id="precio_comunidad_p" step="0.01" value="3.50"></div>
                <div><label style="font-size:12px;">Mediano $</label><input type="number" id="precio_comunidad_m" step="0.01" value="5.00"></div>
                <div><label style="font-size:12px;">Grande $</label><input type="number" id="precio_comunidad_g" step="0.01" value="7.50"></div>
            </div>
        </div>
        <div style="background:#f5f5f5; padding:12px; border-radius:8px; margin-bottom:16px;">
            <h4>🏪 Comercio</h4>
            <div style="display:flex; gap:8px;">
                <div><label style="font-size:12px;">Pequeño $</label><input type="number" id="precio_comercio_p" step="0.01" value="3.00"></div>
                <div><label style="font-size:12px;">Mediano $</label><input type="number" id="precio_comercio_m" step="0.01" value="4.50"></div>
                <div><label style="font-size:12px;">Grande $</label><input type="number" id="precio_comercio_g" step="0.01" value="6.50"></div>
            </div>
        </div>
        <div style="background:#f5f5f5; padding:12px; border-radius:8px; margin-bottom:16px;">
            <h4>🏭 Galpón</h4>
            <div style="display:flex; gap:8px;">
                <div><label style="font-size:12px;">Pequeño $</label><input type="number" id="precio_galpon_p" step="0.01" value="2.50"></div>
                <div><label style="font-size:12px;">Mediano $</label><input type="number" id="precio_galpon_m" step="0.01" value="3.80"></div>
                <div><label style="font-size:12px;">Grande $</label><input type="number" id="precio_galpon_g" step="0.01" value="5.20"></div>
            </div>
        </div>

        <h3>Plantas de llenado</h3>
        <div id="listaPlantas"></div>
        <button class="btn-secondary" onclick="agregarPlanta()">➕ Agregar planta</button>

        <div class="form-group" style="margin-top:16px;">
            <label for="capacidadCamionConfig">Capacidad del camión (cilindros)</label>
            <input type="number" id="capacidadCamionConfig" min="1" value="50">
        </div>

        <button class="btn-primary" onclick="guardarConfiguracion()">Guardar configuración</button>
        <div id="mensaje" style="margin-top:16px; padding:12px; border-radius:8px; display:none;"></div>
    </div>

    <script>
        let plantasEditando = [];

        function cargarConfiguracion() {
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"config":{}}');
            const config = datos.config || {};
            
            const precios = config.precios_venta || {};
            document.getElementById('precio_comunidad_p').value = precios.comunidad?.pequeno || 3.50;
            document.getElementById('precio_comunidad_m').value = precios.comunidad?.mediano || 5.00;
            document.getElementById('precio_comunidad_g').value = precios.comunidad?.grande || 7.50;
            document.getElementById('precio_comercio_p').value = precios.comercio?.pequeno || 3.00;
            document.getElementById('precio_comercio_m').value = precios.comercio?.mediano || 4.50;
            document.getElementById('precio_comercio_g').value = precios.comercio?.grande || 6.50;
            document.getElementById('precio_galpon_p').value = precios.galpon?.pequeno || 2.50;
            document.getElementById('precio_galpon_m').value = precios.galpon?.mediano || 3.80;
            document.getElementById('precio_galpon_g').value = precios.galpon?.grande || 5.20;
            
            document.getElementById('capacidadCamionConfig').value = config.capacidad_camion || 50;
            
            plantasEditando = config.plantas || PLANTAS_PREDEFINIDAS;
            renderPlantas();
        }

        function renderPlantas() {
            const container = document.getElementById('listaPlantas');
            container.innerHTML = '';
            plantasEditando.forEach((p, idx) => {
                const div = document.createElement('div');
                div.style.cssText = 'background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:8px;';
                div.innerHTML = `
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <div style="flex:1; min-width:100px;">
                            <label style="font-size:12px;">Nombre</label>
                            <input type="text" value="${p.nombre}" id="planta_nombre_${idx}" style="padding:8px;">
                        </div>
                        <div style="flex:1; min-width:60px;">
                            <label style="font-size:12px;">Costo P</label>
                            <input type="number" step="0.01" value="${p.costos.pequeno}" id="planta_costo_p_${idx}" style="padding:8px;">
                        </div>
                        <div style="flex:1; min-width:60px;">
                            <label style="font-size:12px;">Costo M</label>
                            <input type="number" step="0.01" value="${p.costos.mediano}" id="planta_costo_m_${idx}" style="padding:8px;">
                        </div>
                        <div style="flex:1; min-width:60px;">
                            <label style="font-size:12px;">Costo G</label>
                            <input type="number" step="0.01" value="${p.costos.grande}" id="planta_costo_g_${idx}" style="padding:8px;">
                        </div>
                        <div style="flex:0 0 auto; display:flex; align-items:flex-end;">
                            <button class="btn-secondary" style="padding:6px 12px; margin:0;" onclick="eliminarPlanta(${idx})">✕</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:4px;">
                        <div style="flex:1;">
                            <label style="font-size:12px;">Combustible</label>
                            <input type="number" step="0.01" value="${p.gastos.combustible}" id="planta_gasto_comb_${idx}" style="padding:8px;">
                        </div>
                        <div style="flex:1;">
                            <label style="font-size:12px;">Peaje</label>
                            <input type="number" step="0.01" value="${p.gastos.peaje}" id="planta_gasto_peaje_${idx}" style="padding:8px;">
                        </div>
                        <div style="flex:1;">
                            <label style="font-size:12px;">Viáticos</label>
                            <input type="number" step="0.01" value="${p.gastos.viaticos}" id="planta_gasto_via_${idx}" style="padding:8px;">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function agregarPlanta() {
            const nueva = {
                id: 'planta_' + Date.now(),
                nombre: 'Nueva planta',
                costos: { pequeno: 2.00, mediano: 3.00, grande: 4.50 },
                gastos: { combustible: 50, peaje: 10, viaticos: 30 }
            };
            plantasEditando.push(nueva);
            renderPlantas();
        }

        function eliminarPlanta(idx) {
            if (confirm('¿Eliminar esta planta?')) {
                plantasEditando.splice(idx, 1);
                renderPlantas();
            }
        }

        function guardarConfiguracion() {
            const precios_venta = {
                comunidad: {
                    pequeno: parseFloat(document.getElementById('precio_comunidad_p').value) || 3.50,
                    mediano: parseFloat(document.getElementById('precio_comunidad_m').value) || 5.00,
                    grande: parseFloat(document.getElementById('precio_comunidad_g').value) || 7.50
                },
                comercio: {
                    pequeno: parseFloat(document.getElementById('precio_comercio_p').value) || 3.00,
                    mediano: parseFloat(document.getElementById('precio_comercio_m').value) || 4.50,
                    grande: parseFloat(document.getElementById('precio_comercio_g').value) || 6.50
                },
                galpon: {
                    pequeno: parseFloat(document.getElementById('precio_galpon_p').value) || 2.50,
                    mediano: parseFloat(document.getElementById('precio_galpon_m').value) || 3.80,
                    grande: parseFloat(document.getElementById('precio_galpon_g').value) || 5.20
                }
            };

            const capacidad_camion = parseInt(document.getElementById('capacidadCamionConfig').value) || 50;

            const plantas = [];
            plantasEditando.forEach((p, idx) => {
                plantas.push({
                    id: p.id || 'planta_' + Date.now() + '_' + idx,
                    nombre: document.getElementById('planta_nombre_' + idx)?.value || p.nombre,
                    costos: {
                        pequeno: parseFloat(document.getElementById('planta_costo_p_' + idx)?.value) || p.costos.pequeno,
                        mediano: parseFloat(document.getElementById('planta_costo_m_' + idx)?.value) || p.costos.mediano,
                        grande: parseFloat(document.getElementById('planta_costo_g_' + idx)?.value) || p.costos.grande
                    },
                    gastos: {
                        combustible: parseFloat(document.getElementById('planta_gasto_comb_' + idx)?.value) || p.gastos.combustible,
                        peaje: parseFloat(document.getElementById('planta_gasto_peaje_' + idx)?.value) || p.gastos.peaje,
                        viaticos: parseFloat(document.getElementById('planta_gasto_via_' + idx)?.value) || p.gastos.viaticos
                    }
                });
            });

            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"config":{}}');
            datos.config.precios_venta = precios_venta;
            datos.config.plantas = plantas;
            datos.config.capacidad_camion = capacidad_camion;
            localStorage.setItem('gasguaribe_datos_v2', JSON.stringify(datos));

            mostrarMensaje('✅ Configuración guardada', 'exito');
        }

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.style.display = 'block';
            msg.style.backgroundColor = tipo === 'exito' ? '#d4edda' : '#f8d7da';
            msg.style.color = tipo === 'exito' ? '#155724' : '#721c24';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        document.addEventListener('DOMContentLoaded', cargarConfiguracion);
    </script>
</body>
</html>
