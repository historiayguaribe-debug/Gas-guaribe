<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Gastos - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💸 Gastos</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <div id="totalGastos" class="subtotal-box">Total de gastos: $0.00</div>

        <form id="formGasto">
            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" required>
                    <option value="">Selecciona</option>
                    <option value="combustible">Combustible</option>
                    <option value="peaje">Peaje</option>
                    <option value="viaticos">Viáticos</option>
                    <option value="imprevistos">Imprevistos</option>
                    <option value="nomina">Nómina</option>
                    <option value="alquiler">Alquiler</option>
                    <option value="mantenimiento">Mantenimiento</option>
                    <option value="repuestos">Repuestos</option>
                    <option value="varios">Varios</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <input type="text" id="descripcion" placeholder="Detalle del gasto">
            </div>

            <div class="form-group">
                <label for="monto">Monto ($)</label>
                <input type="number" id="monto" step="0.01" min="0" required>
            </div>

            <button type="submit" class="btn-primary">Registrar gasto</button>
        </form>

        <div id="mensaje" style="margin-top:16px; padding:12px; border-radius:8px; display:none;"></div>
    </div>

    <script>
        function actualizarTotalGastos() {
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"gastos":[]}');
            const total = (datos.gastos || []).reduce((sum, g) => sum + g.monto, 0);
            document.getElementById('totalGastos').textContent = `Total de gastos: $${total.toFixed(2)}`;
        }

        document.getElementById('formGasto').addEventListener('submit', function(e) {
            e.preventDefault();
            const categoria = document.getElementById('categoria').value;
            const descripcion = document.getElementById('descripcion').value;
            const monto = parseFloat(document.getElementById('monto').value);

            if (!categoria) {
                mostrarMensaje('Selecciona una categoría', 'error');
                return;
            }

            if (!monto || monto <= 0) {
                mostrarMensaje('Ingresa un monto válido', 'error');
                return;
            }

            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"gastos":[]}');
            const gasto = {
                id: Date.now(),
                categoria,
                descripcion: descripcion || categoria,
                monto,
                fecha: new Date().toISOString()
            };
            datos.gastos.push(gasto);
            localStorage.setItem('gasguaribe_datos_v2', JSON.stringify(datos));

            mostrarMensaje(`✅ Gasto registrado: ${categoria} - $${monto.toFixed(2)}`, 'exito');
            document.getElementById('formGasto').reset();
            actualizarTotalGastos();
        });

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.style.display = 'block';
            msg.style.backgroundColor = tipo === 'exito' ? '#d4edda' : '#f8d7da';
            msg.style.color = tipo === 'exito' ? '#155724' : '#721c24';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }

        document.addEventListener('DOMContentLoaded', actualizarTotalGastos);
    </script>
</body>
</html>
