<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ventas almacén - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏪 Ventas directas</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <form id="formVenta">
            <div class="form-group">
                <label for="cliente">Cliente</label>
                <input type="text" id="cliente" placeholder="Nombre del cliente" required>
            </div>

            <div class="form-group">
                <label>Cilindros vendidos</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Pequeños</label>
                        <input type="number" id="pequenos" min="0" value="0" oninput="calcularTotalVenta()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Medianos</label>
                        <input type="number" id="medianos" min="0" value="0" oninput="calcularTotalVenta()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Grandes</label>
                        <input type="number" id="grandes" min="0" value="0" oninput="calcularTotalVenta()">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Precio unitario</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Pequeño $</label>
                        <input type="number" id="precio_pequeno" step="0.01" value="3.50" oninput="calcularTotalVenta()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Mediano $</label>
                        <input type="number" id="precio_mediano" step="0.01" value="5.00" oninput="calcularTotalVenta()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Grande $</label>
                        <input type="number" id="precio_grande" step="0.01" value="7.50" oninput="calcularTotalVenta()">
                    </div>
                </div>
            </div>

            <div id="totalVenta" class="subtotal-box">Total: $0.00</div>

            <button type="submit" class="btn-primary">Registrar venta</button>
        </form>

        <div id="mensaje" style="margin-top:16px; padding:12px; border-radius:8px; display:none;"></div>
    </div>

    <script>
        function calcularTotalVenta() {
            const p = parseInt(document.getElementById('pequenos').value) || 0;
            const m = parseInt(document.getElementById('medianos').value) || 0;
            const g = parseInt(document.getElementById('grandes').value) || 0;
            const precioP = parseFloat(document.getElementById('precio_pequeno').value) || 0;
            const precioM = parseFloat(document.getElementById('precio_mediano').value) || 0;
            const precioG = parseFloat(document.getElementById('precio_grande').value) || 0;
            const total = (p * precioP) + (m * precioM) + (g * precioG);
            document.getElementById('totalVenta').textContent = `Total: $${total.toFixed(2)}`;
        }

        document.getElementById('formVenta').addEventListener('submit', function(e) {
            e.preventDefault();
            const cliente = document.getElementById('cliente').value.trim();
            const pequenos = parseInt(document.getElementById('pequenos').value) || 0;
            const medianos = parseInt(document.getElementById('medianos').value) || 0;
            const grandes = parseInt(document.getElementById('grandes').value) || 0;

            if (!cliente) {
                mostrarMensaje('Ingresa el nombre del cliente', 'error');
                return;
            }

            if (pequenos === 0 && medianos === 0 && grandes === 0) {
                mostrarMensaje('Vende al menos un cilindro', 'error');
                return;
            }

            // Cargar datos de la versión 2.1
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"ventas":[]}');
            const venta = {
                id: Date.now(),
                cliente,
                pequenos,
                medianos,
                grandes,
                precio_unitario: {
                    pequeno: parseFloat(document.getElementById('precio_pequeno').value) || 3.50,
                    mediano: parseFloat(document.getElementById('precio_mediano').value) || 5.00,
                    grande: parseFloat(document.getElementById('precio_grande').value) || 7.50
                },
                fecha: new Date().toISOString()
            };
            datos.ventas.push(venta);
            localStorage.setItem('gasguaribe_datos_v2', JSON.stringify(datos));

            const total = (pequenos * venta.precio_unitario.pequeno) + 
                         (medianos * venta.precio_unitario.mediano) + 
                         (grandes * venta.precio_unitario.grande);
            
            mostrarMensaje(`✅ Venta registrada: ${cliente} - Total: $${total.toFixed(2)}`, 'exito');
            document.getElementById('formVenta').reset();
            calcularTotalVenta();
        });

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.style.display = 'block';
            msg.style.backgroundColor = tipo === 'exito' ? '#d4edda' : '#f8d7da';
            msg.style.color = tipo === 'exito' ? '#155724' : '#721c24';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }

        document.addEventListener('DOMContentLoaded', calcularTotalVenta);
    </script>
</body>
</html>
