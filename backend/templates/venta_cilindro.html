<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Venta - GASGUARIBE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .form-container {
            background: #1e293b;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #334155;
        }
        .form-container h1 {
            color: #fbbf24;
            text-align: center;
            margin-bottom: 5px;
        }
        .form-container .sub {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            color: #e2e8f0;
            display: block;
            margin: 18px 0 5px;
            font-weight: 500;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        select:focus, input:focus { border-color: #fbbf24; }
        .counter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f172a;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #475569;
        }
        .counter-group .size-label {
            flex: 1;
            color: #e2e8f0;
            font-weight: 500;
        }
        .counter-btn {
            background: #334155;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .counter-btn:hover {
            background: #fbbf24;
            color: #0f172a;
        }
        .counter-btn.minus { background: #7f1d1d; }
        .counter-btn.minus:hover { background: #dc2626; }
        .counter-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fbbf24;
            min-width: 40px;
            text-align: center;
        }
        .btn-submit {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover { background: #f59e0b; transform: scale(1.02); }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
        }
        .btn-back:hover { color: #fbbf24; }
        .exonerado-badge {
            display: inline-block;
            background: #22c55e20;
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #22c55e40;
            margin-left: 8px;
        }
        .row { display: flex; gap: 15px; }
        .row > * { flex: 1; }
        @media (max-width: 500px) { .row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🛒 Registrar Venta</h1>
        <p class="sub">Venta de cilindros a cliente</p>

        <form method="post" action="/admin/venta" id="ventaForm">
            <!-- Cliente (con selector visual) -->
            <label for="cliente_id">👤 Cliente</label>
            <select name="cliente_id" id="cliente_id" required>
                <option value="">-- Selecciona un cliente --</option>
                {% for cliente in clientes %}
                <option value="{{ cliente.id }}">
                    {{ cliente.usuario.nombre if cliente.usuario else 'Cliente' }}
                    {% if cliente.exonerado %} 🏫 (Exonerado){% endif %}
                </option>
                {% endfor %}
            </select>

            <!-- Planta -->
            <label for="planta_id">📍 Planta de origen</label>
            <select name="planta_id" id="planta_id" required>
                <option value="">-- Selecciona una planta --</option>
                {% for planta in plantas %}
                <option value="{{ planta.id }}" {% if loop.first %}selected{% endif %}>{{ planta.nombre }}</option>
                {% endfor %}
            </select>

            <!-- Tamaño (selector visual) -->
            <label>📏 Tamaño del cilindro</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button type="button" class="size-selector" data-size="P" style="flex:1; padding: 12px; border-radius:10px; border:2px solid #334155; background:#0f172a; color:white; cursor:pointer; font-weight:bold;" onclick="selectSize('P')">
                    Pequeño <small style="display:block; color:#94a3b8;">5kg</small>
                </button>
                <button type="button" class="size-selector" data-size="M" style="flex:1; padding: 12px; border-radius:10px; border:2px solid #334155; background:#0f172a; color:white; cursor:pointer; font-weight:bold;" onclick="selectSize('M')">
                    Mediano <small style="display:block; color:#94a3b8;">15kg</small>
                </button>
                <button type="button" class="size-selector" data-size="G" style="flex:1; padding: 12px; border-radius:10px; border:2px solid #334155; background:#0f172a; color:white; cursor:pointer; font-weight:bold;" onclick="selectSize('G')">
                    Grande <small style="display:block; color:#94a3b8;">45kg</small>
                </button>
            </div>
            <input type="hidden" name="tamanio" id="tamanioInput" value="P">

            <!-- Cantidad -->
            <label>🔢 Cantidad</label>
            <div class="counter-group">
                <button type="button" class="counter-btn minus" onclick="updateCantidad(-1)">−</button>
                <span class="counter-value" id="cantidadDisplay">1</span>
                <button type="button" class="counter-btn" onclick="updateCantidad(1)">+</button>
            </div>
            <input type="hidden" name="cantidad" id="cantidadInput" value="1">

            <!-- Fecha -->
            <label for="fecha">📅 Fecha de venta</label>
            <input type="date" name="fecha" id="fecha" required>

            <button type="submit" class="btn-submit">✅ Registrar Venta</button>
        </form>

        <a href="/admin/panel" class="btn-back">← Volver al panel</a>
    </div>

    <script>
        // --- SELECCIONAR TAMAÑO ---
        let selectedSize = 'P';
        function selectSize(size) {
            selectedSize = size;
            document.getElementById('tamanioInput').value = size;
            // Resaltar botón seleccionado
            document.querySelectorAll('.size-selector').forEach(el => {
                el.style.borderColor = el.dataset.size === size ? '#fbbf24' : '#334155';
                el.style.background = el.dataset.size === size ? '#334155' : '#0f172a';
            });
        }

        // --- CONTADOR DE CANTIDAD ---
        let cantidad = 1;
        function updateCantidad(delta) {
            cantidad = Math.max(1, cantidad + delta);
            document.getElementById('cantidadDisplay').textContent = cantidad;
            document.getElementById('cantidadInput').value = cantidad;
        }

        // --- FECHA AUTOMÁTICA ---
        document.addEventListener('DOMContentLoaded', function() {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = hoy;
            // Seleccionar P por defecto
            selectSize('P');
        });
    </script>
</body>
</html>
