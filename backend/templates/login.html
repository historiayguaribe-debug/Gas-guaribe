<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS GUARIBE - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            color: #f1f5f9;
        }
        .login-card h1 {
            color: #fbbf24;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-card .form-control {
            background: #334155;
            border: none;
            color: #f1f5f9;
            padding: 0.75rem 1rem;
        }
        .login-card .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(251, 191, 36, 0.25);
        }
        .btn-gold {
            background: #fbbf24;
            color: #0f172a;
            font-weight: bold;
            padding: 0.75rem;
            font-size: 1.2rem;
        }
        .btn-gold:hover {
            background: #f59e0b;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1><i class="fas fa-fire"></i> GAS GUARIBE</h1>
        <form action="/token" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-gold w-100">Iniciar Sesión</button>
        </form>
        <div class="mt-3 text-center small text-secondary">Usuario: admin / Contraseña: admin123</div>
    </div>
</body>
</html>
