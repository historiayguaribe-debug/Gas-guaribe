<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GASGUARIBE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: #1e293b;
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }
        .login-container .logo { text-align: center; font-size: 3rem; margin-bottom: 5px; }
        .login-container h1 {
            color: #fbbf24;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .login-container .sub {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .login-container label {
            color: #e2e8f0;
            display: block;
            margin: 15px 0 5px;
            font-weight: 500;
        }
        .login-container input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .login-container input:focus { border-color: #fbbf24; }
        .login-container .btn-login {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-container .btn-login:hover { background: #f59e0b; transform: scale(1.02); }
        .login-container .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .login-container .error-msg {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
            border: 1px solid #991b1b;
        }
        .login-container .info {
            color: #475569;
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
        }
        .login-container .info strong { color: #fbbf24; }
        .spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏠</div>
        <h1>GASGUARIBE</h1>
        <p class="sub">Inicia sesión para administrar tu negocio</p>

        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <label for="email">📧 Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required value="admin@test.com">

            <label for="password">🔒 Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required value="1234">

            <button type="submit" class="btn-login" id="loginBtn">🚀 Iniciar Sesión</button>

            <div id="errorMsg" class="error-msg"></div>
            <div id="spinner" class="spinner">⏳ Verificando credenciales...</div>
        </form>

        <div class="info">
            💡 Usuario de prueba: <strong>admin@test.com</strong> / <strong>1234</strong>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const spinner = document.getElementById('spinner');
            const loginBtn = document.getElementById('loginBtn');

            errorMsg.style.display = 'none';
            errorMsg.textContent = '';
            spinner.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Iniciando...';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'username': email, 'password': password })
                });
                const data = await response.json();

                spinner.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Iniciar Sesión';

                if (!response.ok) {
                    errorMsg.textContent = data.detail || '❌ Error al iniciar sesión. Verifica tus credenciales.';
                    errorMsg.style.display = 'block';
                    return;
                }

                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('user_rol', data.rol);
                localStorage.setItem('user_nombre', data.nombre);
                localStorage.setItem('user_id', data.usuario_id);

                window.location.href = '/admin/dashboard';

            } catch (error) {
                spinner.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Iniciar Sesión';
                errorMsg.textContent = '❌ Error de conexión. Intenta de nuevo.';
                errorMsg.style.display = 'block';
                console.error('Error:', error);
            }
        }

        window.onload = function() {
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = '/admin/dashboard';
            }
        };
    </script>
</body>
</html>
