<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GASGUARIBE - Tu Gas a Domicilio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }
        .status-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 5px solid #22c55e;
        }
        .status-card p {
            color: #cbd5e1;
            font-size: 1rem;
        }
        .status-card strong {
            color: #4ade80;
        }
        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            background: #334155;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #475569;
            font-size: 1rem;
        }
        .btn-primary {
            background: #f59e0b;
            color: #0f172a;
            border: none;
        }
        .btn-primary:hover {
            background: #fbbf24;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #1e293b;
            border: 1px solid #f59e0b;
        }
        .btn-secondary:hover {
            background: #2d3a4f;
            transform: scale(1.05);
        }
        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .badge {
            display: inline-block;
            background: #22c55e20;
            color: #4ade80;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #22c55e40;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>GASGUARIBE</h1>
        <p class="subtitle">🚚 Tu servicio de gas a domicilio, <br>inteligente y confiable</p>
        
        <div class="status-card">
            <span class="badge">✅ Sistema Activo</span>
            <p style="margin-top: 10px;">Municipio Guaribe conectado con <strong>3 Plantas</strong> y repartidores en tiempo real.</p>
        </div>

        <div class="buttons">
            <a href="/docs" target="_blank" class="btn btn-primary">
                📖 Ver Documentación (API)
            </a>
            <a href="/reportes/resumen-diario" target="_blank" class="btn btn-secondary">
                📊 Ver Estadísticas
            </a>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <span style="background: #0f172a; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #334155;">🟢 Repartidores: 1</span>
            <span style="background: #0f172a; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #334155;">🏭 Plantas: 3</span>
        </div>

        <div class="footer">
            ⚡ Desplegado con Render · Gas Guaribe 2026
        </div>
    </div>
</body>
</html>
