{% extends "admin_base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="row g-4">
    <div class="col-6 col-md-3">
        <div class="card text-bg-primary">
            <div class="card-body text-center">
                <h5 class="card-title">Disponibles</h5>
                <p class="display-6">{{ disponibles }}</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-bg-success">
            <div class="card-body text-center">
                <h5 class="card-title">Ventas Hoy</h5>
                <p class="display-6">{{ ventas_hoy }}</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-bg-warning">
            <div class="card-body text-center">
                <h5 class="card-title">Ingresos Hoy</h5>
                <p class="display-6">${{ "%.2f"|format(ingresos_hoy) }}</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-bg-danger">
            <div class="card-body text-center">
                <h5 class="card-title">Exonerados Hoy</h5>
                <p class="display-6">{{ exonerados_hoy }}</p>
            </div>
        </div>
    </div>
</div>
<div class="row mt-4">
    <div class="col-md-6">
        <canvas id="ventasPorTamano" height="200"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="ventasPorCircuito" height="200"></canvas>
    </div>
</div>
<script>
    // Ejemplo de gráficos - puedes llenarlos con datos desde el backend
    // Se pueden añadir llamadas fetch a /reportes/datos_graficos
</script>
{% endblock %}
