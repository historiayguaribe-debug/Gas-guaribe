{% extends "admin_base.html" %}

{% block ventas_active %}active{% endblock %}
{% block page_title %}Registrar Venta{% endblock %}
{% block breadcrumb %}Administración / Ventas{% endblock %}

{% block content %}
<div class="grid-2">
    <div class="card">
        <div class="card-title">🛒 Nueva Venta</div>
        <form id="ventaForm">
            <div class="form-group">
                <label for="cliente">Cliente</label>
                <select id="cliente" required>
                    <option value="">Seleccionar</option>
                    {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c.usuario.nombre if c.usuario else 'Cliente' }} {% if c.exonerado %}(Exonerado){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="plantaVenta">Planta</label>
                <select id="plantaVenta" required>
                    {% for p in plantas %}
                    <option value="{{ p.id }}">{{ p.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Tamaño</label>
                <div style="display:flex; gap:15px;">
                    <label><input type="radio" name="tamanio" value="P" checked> Pequeño</label>
                    <label><input type="radio" name="tamanio" value="M"> Mediano</label>
                    <label><input type="radio" name="tamanio" value="G"> Grande</label>
                </div>
            </div>
            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" value="1" required>
            </div>
            <div class="form-group">
                <label for="precioVenta">Precio Unitario (Bs)</label>
                <input type="number" id="precioVenta" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="fechaVenta">Fecha</label>
                <input type="date" id="fechaVenta" required>
            </div>
            <button type="submit" class="btn">✅ Registrar Venta</button>
        </form>
        <div id="msg" style="margin-top:10px; font-weight:600;"></div>
    </div>
</div>

<script>
    document.getElementById('fechaVenta').value = new Date().toISOString().split('T')[0];

    document.getElementById('ventaForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const msg = document.getElementById('msg');
        msg.innerHTML = '';

        const data = {
            cliente_id: parseInt(document.getElementById('cliente').value),
            planta_id: parseInt(document.getElementById('plantaVenta').value),
            tamanio: document.querySelector('input[name="tamanio"]:checked').value,
            cantidad: parseInt(document.getElementById('cantidad').value),
            precio_unitario: parseFloat(document.getElementById('precioVenta').value),
            fecha: document.getElementById('fechaVenta').value
        };

        if (!data.cliente_id) {
            msg.innerHTML = '<span style="color:#ef4444;">❌ Selecciona un cliente.</span>';
            return;
        }

        try {
            const token = localStorage.getItem('access_token');
            const response = await fetch('/admin/ventas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                msg.innerHTML = `<span style="color:#22c55e;">✅ ${result.mensaje} (Total: $${result.total})</span>`;
                document.getElementById('ventaForm').reset();
                document.getElementById('fechaVenta').value = new Date().toISOString().split('T')[0];
            } else {
                msg.innerHTML = `<span style="color:#ef4444;">❌ Error: ${result.detail || 'No se pudo registrar'}</span>`;
            }
        } catch (error) {
            msg.innerHTML = `<span style="color:#ef4444;">❌ Error de conexión: ${error.message}</span>`;
        }
    });
</script>
{% endblock %}
