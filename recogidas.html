<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 GAS GUARIBE</h1>
            <p class="subtitle"><span id="fechaActual"></span></p>
        </header>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-card clickable" onclick="verDetalle('pendientes')">
                    <span class="stat-number" id="recogidasPendientes">0</span>
                    <span class="stat-label">⏳ Recogidas pendientes</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('parciales')">
                    <span class="stat-number" id="recogidasParciales">0</span>
                    <span class="stat-label">⚠️ Recogidas parciales</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('cargas')">
                    <span class="stat-number" id="cargasActivas">0</span>
                    <span class="stat-label">🛻 Cargas activas</span>
                </div>
                <div class="stat-card clickable" onclick="verDetalle('entregas')">
                    <span class="stat-number" id="entregasHoy">0</span>
                    <span class="stat-label">✅ Entregas hoy</span>
                </div>
            </div>

            <div id="resumenPendientes" style="margin:12px 0; padding:12px; background:#fff3e0; border-radius:8px; font-size:14px; color:#e65100; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                <span><strong>📦 Pendientes de enviar:</strong> <span id="totalPendientes">0</span> cilindros</span>
                <button class="btn-secondary" style="padding:6px 12px; font-size:12px; width:auto; margin:0;" onclick="window.location.href='cargas.html'">🛻 Armar carga ahora</button>
            </div>

            <div class="menu-grid">
                <a href="recogidas.html" class="menu-btn">📋 Recogidas</a>
                <a href="cargas.html" class="menu-btn">🛻 Armar carga</a>
                <a href="entregas.html" class="menu-btn">💰 Registrar entrega</a>
                <a href="inventario.html" class="menu-btn">📦 Ver inventario</a>
                <a href="ventas.html" class="menu-btn">🏪 Ventas almacén</a>
                <a href="gastos.html" class="menu-btn">💸 Gastos</a>
                <a href="reportes.html" class="menu-btn">📊 Reportes</a>
                <a href="configuracion.html" class="menu-btn">⚙️ Configurar</a>
            </div>
        </div>

        <footer>
            <p>GAS GUARIBE v2.0</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('fechaActual').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function verDetalle(tipo) {
            switch(tipo) {
                case 'pendientes': window.location.href = 'recogidas.html?filtro=pendiente'; break;
                case 'parciales': window.location.href = 'recogidas.html?filtro=parcial'; break;
                case 'cargas': window.location.href = 'cargas.html'; break;
                case 'entregas': window.location.href = 'entregas.html'; break;
                default: break;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            actualizarDashboard();
            setInterval(actualizarDashboard, 30000);
        });
    </script>
</body>
</html>
