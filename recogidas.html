<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Recogidas - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Recogidas</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <div class="form-group">
            <label for="filtroEstado">Filtrar por estado</label>
            <select id="filtroEstado" onchange="cargarListaRecogidas()">
                <option value="todas">Todas</option>
                <option value="pendiente">⏳ Pendientes</option>
                <option value="parcial">⚠️ Parciales</option>
                <option value="completa">✅ Completas</option>
            </select>
        </div>

        <div id="listaRecogidas" style="margin-top:12px;"></div>

        <button class="btn-primary" onclick="window.location.href='recogida_nueva.html'" style="margin-top:12px;">➕ Nueva recogida</button>
    </div>

    <script>
        function cargarListaRecogidas() {
            cargarDatos();
            const filtro = document.getElementById('filtroEstado').value;
            let recogidas = datos.recogidas || [];
            if (filtro !== 'todas') {
                recogidas = recogidas.filter(r => r.estado === filtro);
            }
            recogidas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

            const container = document.getElementById('listaRecogidas');
            if (recogidas.length === 0) {
                container.innerHTML = '<p style="color:#999; text-align:center; padding:20px;">No hay recogidas</p>';
                return;
            }

            let html = '';
            recogidas.forEach(r => {
                const fecha = new Date(r.fecha).toLocaleDateString();
                const saldo = obtenerSaldoRecogida(r);
                const plantaNombre = obtenerNombrePlanta(r.planta);
                let estadoLabel = '', estadoColor = '';
                if (r.estado === 'completa') { estadoLabel = '✅ Completa'; estadoColor = '#4caf50'; }
                else if (r.estado === 'parcial') { estadoLabel = '⚠️ Parcial'; estadoColor = '#ff9800'; }
                else { estadoLabel = '⏳ Pendiente'; estadoColor = '#2196f3'; }
                html += `
                    <div style="background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:8px; border-left:4px solid ${estadoColor};">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${r.comunidad}</strong>
                            <span>${estadoLabel}</span>
                        </div>
                        <div style="font-size:13px; color:#555;">
                            ${fecha} - Planta: ${plantaNombre}
                            <br>Recogido: P:${r.pequenos} M:${r.medianos} G:${r.grandes}
                            <br>Enviado: P:${r.enviado?.p || 0} M:${r.enviado?.m || 0} G:${r.enviado?.g || 0}
                            <br><strong>Saldo pendiente:</strong> P:${saldo.p} M:${saldo.m} G:${saldo.g} (${saldo.total} total)
                            ${r.observaciones ? `<br><em>${r.observaciones}</em>` : ''}
                        </div>
                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <button class="btn-secondary" style="padding:6px 12px; font-size:12px; flex:1;" onclick="editarRecogida(${r.id})">✏️ Editar</button>
                            <button class="btn-danger" style="padding:6px 12px; font-size:12px; flex:1;" onclick="eliminarRecogida(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function editarRecogida(id) {
            window.location.href = `recogida_nueva.html?edit=${id}`;
        }

        function eliminarRecogida(id) {
            if (confirm('¿Eliminar esta recogida?')) {
                eliminarRecogida(id);
                cargarListaRecogidas();
                actualizarDashboard();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            cargarListaRecogidas();
        });
    </script>
</body>
</html>
