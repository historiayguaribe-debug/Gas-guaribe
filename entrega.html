<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Registrar entrega - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Registrar entrega</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <form id="formEntrega">
            <div class="form-group">
                <label for="cargaId">Seleccionar carga</label>
                <select id="cargaId" required>
                    <option value="">Selecciona una carga completada</option>
                </select>
            </div>

            <div id="detalleCarga" style="display:none;"></div>

            <div class="form-group">
                <label>Cilindros entregados</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Pequeños</label>
                        <input type="number" id="pequenos" min="0" value="0">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Medianos</label>
                        <input type="number" id="medianos" min="0" value="0">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Grandes</label>
                        <input type="number" id="grandes" min="0" value="0">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Pago recibido</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Efectivo $</label>
                        <input type="number" id="pago_efectivo" step="0.01" value="0">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Transferencia $</label>
                        <input type="number" id="pago_transferencia" step="0.01" value="0">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Punto $</label>
                        <input type="number" id="pago_punto" step="0.01" value="0">
                    </div>
                </div>
                <div id="totalPago" class="subtotal-box">Total recibido: $0.00</div>
            </div>

            <button type="submit" class="btn-primary">Registrar entrega</button>
        </form>

        <div id="mensaje" style="margin-top:16px; padding:12px; border-radius:8px; display:none;"></div>
    </div>

    <script>
        function cargarCargasCompletadas() {
            cargarDatos();
            const cargas = datos.cargas.filter(c => c.estado === 'activa');
            const select = document.getElementById('cargaId');
            select.innerHTML = '<option value="">Selecciona una carga</option>';
            cargas.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                const total = c.items.reduce((sum, i) => sum + i.pequenos + i.medianos + i.grandes, 0);
                option.textContent = `Carga #${c.id} - ${new Date(c.fecha).toLocaleDateString()} (${total} cilindros)`;
                select.appendChild(option);
            });
        }

        document.getElementById('cargaId').addEventListener('change', function() {
            const id = parseInt(this.value);
            if (!id) {
                document.getElementById('detalleCarga').style.display = 'none';
                return;
            }
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2'));
            const carga = datos.cargas.find(c => c.id === id);
            if (!carga) return;

            let html = '<h4>Detalle de la carga</h4>';
            carga.items.forEach(item => {
                const recogida = datos.recogidas.find(r => r.id === item.recogidaId);
                if (recogida) {
                    html += `<div style="padding:6px; background:#f8f9fa; margin:4px 0; border-radius:4px;">
                        ${recogida.comunidad}: P:${item.pequenos} M:${item.medianos} G:${item.grandes}
                    </div>`;
                }
            });
            document.getElementById('detalleCarga').innerHTML = html;
            document.getElementById('detalleCarga').style.display = 'block';
        });

        document.addEventListener('DOMContentLoaded', function() {
            cargarCargasCompletadas();
        });
    </script>
</body>
</html>
