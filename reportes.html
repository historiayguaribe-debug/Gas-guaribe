<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reportes - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Reportes</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <div class="form-group">
            <label for="tipoReporte">Tipo de reporte</label>
            <select id="tipoReporte" onchange="cambiarReporte()">
                <option value="resumen">📅 Resumen general</option>
                <option value="exonerados">🎓 Exoneraciones</option>
                <option value="comunidades">📊 Resumen por comunidad</option>
            </select>
        </div>

        <div id="reporteResultado" style="margin-top:16px; padding:16px; background:#f8f9fa; border-radius:8px;">
            <div id="reporteContenido"><p style="color:#999;">Selecciona un tipo de reporte</p></div>
        </div>
    </div>

    <script>
        function obtenerDatos() {
            const saved = localStorage.getItem('gasguaribe_datos_v2');
            return saved ? JSON.parse(saved) : { recogidas: [], cargas: [], entregas: [], ventas: [], gastos: [] };
        }

        function cambiarReporte() {
            const tipo = document.getElementById('tipoReporte').value;
            const datos = obtenerDatos();
            let html = '';

            if (tipo === 'resumen') {
                const totalRecogidos = datos.recogidas.reduce((sum, r) => sum + r.pequenos + r.medianos + r.grandes, 0);
                const totalEntregados = datos.entregas.reduce((sum, e) => sum + e.pequenos + e.medianos + e.grandes, 0);
                html = `
                    <h4>📅 Resumen general</h4>
                    <p><strong>Total recogido:</strong> ${totalRecogidos} cilindros</p>
                    <p><strong>Total entregado:</strong> ${totalEntregados} cilindros</p>
                    <p><strong>Cargas realizadas:</strong> ${datos.cargas.length}</p>
                `;
            } else if (tipo === 'exonerados') {
                let exonerados = [];
                datos.entregas.forEach(e => {
                    if (e.exonerados) {
                        e.exonerados.forEach(ex => {
                            exonerados.push({ ...ex, comunidad: e.comunidad, fecha: e.fecha });
                        });
                    }
                });
                if (exonerados.length === 0) {
                    html = '<p style="color:#999;">No hay exoneraciones registradas</p>';
                } else {
                    html = `<h4>🎓 Exoneraciones</h4><table style="width:100%; border-collapse:collapse; font-size:13px;">
                        <tr style="background:#0d47a1; color:white;">
                            <th style="padding:6px;">Fecha</th><th style="padding:6px;">Comunidad</th>
                            <th style="padding:6px;">Institución</th><th style="padding:6px;">P</th>
                            <th style="padding:6px;">M</th><th style="padding:6px;">G</th>
                        </tr>`;
                    exonerados.forEach(ex => {
                        html += `<tr>
                            <td style="padding:4px;">${new Date(ex.fecha).toLocaleDateString()}</td>
                            <td style="padding:4px;">${ex.comunidad}</td>
                            <td style="padding:4px;">${ex.institucion}</td>
                            <td style="padding:4px;">${ex.pequenos}</td>
                            <td style="padding:4px;">${ex.medianos}</td>
                            <td style="padding:4px;">${ex.grandes}</td>
                        </tr>`;
                    });
                    html += '</table>';
                }
            } else if (tipo === 'comunidades') {
                const map = {};
                datos.recogidas.forEach(r => {
                    if (!map[r.comunidad]) map[r.comunidad] = { recogido: 0, entregado: 0 };
                    map[r.comunidad].recogido += r.pequenos + r.medianos + r.grandes;
                });
                datos.entregas.forEach(e => {
                    if (!map[e.comunidad]) map[e.comunidad] = { recogido: 0, entregado: 0 };
                    map[e.comunidad].entregado += e.pequenos + e.medianos + e.grandes;
                });
                html = `<h4>📊 Resumen por comunidad</h4><table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <tr style="background:#0d47a1; color:white;">
                        <th style="padding:6px;">Comunidad</th>
                        <th style="padding:6px;">Recogido</th>
                        <th style="padding:6px;">Entregado</th>
                        <th style="padding:6px;">Pendiente</th>
                    </tr>`;
                for (const [comunidad, data] of Object.entries(map)) {
                    html += `<tr>
                        <td style="padding:4px;">${comunidad}</td>
                        <td style="padding:4px;">${data.recogido}</td>
                        <td style="padding:4px;">${data.entregado}</td>
                        <td style="padding:4px;">${data.recogido - data.entregado}</td>
                    </tr>`;
                }
                html += '</table>';
            }

            document.getElementById('reporteContenido').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', cambiarReporte);
    </script>
</body>
</html>
