<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reportes - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Reportes</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <div style="display:flex; gap:8px; margin:16px 0;">
            <button class="menu-btn" onclick="generarExcel()" style="background:#1e7e34;">📥 Excel</button>
            <button class="menu-btn" onclick="generarPDF()" style="background:#c62828;">📥 PDF</button>
        </div>

        <div class="form-group">
            <label for="tipoReporte">Tipo de reporte</label>
            <select id="tipoReporte" onchange="cambiarReporte()">
                <option value="cargas">📄 Cargas realizadas</option>
                <option value="inventario">📦 Inventario</option>
                <option value="exonerados">🎓 Exonerados</option>
                <option value="ventas">🏪 Ventas almacén</option>
                <option value="gastos">💸 Gastos</option>
                <option value="mensual">📅 Resumen mensual</option>
                <option value="historial_comunidad">📋 Historial por comunidad</option>
                <option value="cargas_detalle">🚛 Detalle de cargas</option>
                <option value="resumen_comunidades">📊 Resumen por comunidad</option>
                <option value="exonerados_detalle">🎓 Detalle de exoneraciones</option>
            </select>
        </div>

        <div id="reporteResultado" style="margin-top:16px; padding:16px; background:#f8f9fa; border-radius:8px;">
            <div id="reporteContenido">
                <p style="color:#999;">Selecciona un tipo de reporte</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // FUNCIONES DE AYUDA (ya existentes)
        // ============================================================
        function obtenerDatos() {
            const saved = localStorage.getItem('gasguaribe_datos_v2');
            if (saved) {
                try { return JSON.parse(saved); }
                catch(e) { return { recogidas: [], entregas: [], ventas: [], gastos: [], cargas: [], config: {} }; }
            }
            return { recogidas: [], entregas: [], ventas: [], gastos: [], cargas: [], config: {} };
        }

        function calcularTotalEntrega(entrega) {
            const p = entrega.precios || { pequeno: 3.50, mediano: 5.00, grande: 7.50 };
            return (entrega.pequenos * p.pequeno) + (entrega.medianos * p.mediano) + (entrega.grandes * p.grande);
        }

        function calcularPagoTotal(entrega) {
            return (entrega.pago_efectivo || 0) + (entrega.pago_transferencia || 0) + (entrega.pago_punto_venta || 0);
        }

        function obtenerComunidades() {
            const datos = obtenerDatos();
            return datos.comunidades || [];
        }

        function obtenerNombrePlanta(plantaId) {
            const datos = obtenerDatos();
            const plantas = datos.config?.plantas || [];
            const planta = plantas.find(p => p.id === plantaId);
            return planta ? planta.nombre : (plantaId || 'No especificada');
        }

        function obtenerSaldoRecogida(recogida) {
            const enviado = recogida.enviado || { p: 0, m: 0, g: 0 };
            return {
                p: recogida.pequenos - enviado.p,
                m: recogida.medianos - enviado.m,
                g: recogida.grandes - enviado.g,
                total: (recogida.pequenos - enviado.p) + (recogida.medianos - enviado.m) + (recogida.grandes - enviado.g)
            };
        }

        function obtenerResumenCarga(cargaId) {
            const datos = obtenerDatos();
            const carga = datos.cargas.find(c => c.id === cargaId);
            if (!carga) return null;
            const resumen = {
                totalP: 0,
                totalM: 0,
                totalG: 0,
                totalExonerados: 0,
                costoExonerados: 0,
                comunidades: []
            };
            carga.items.forEach(item => {
                const recogida = datos.recogidas.find(r => r.id === item.recogidaId);
                if (recogida) {
                    const exoTotal = (item.exonerados || []).reduce((sum, ex) => sum + ex.pequenos + ex.medianos + ex.grandes, 0);
                    const exoCosto = (item.exonerados || []).reduce((sum, ex) => sum + ex.costo, 0);
                    resumen.comunidades.push({
                        comunidad: recogida.comunidad,
                        pequenos: item.pequenos,
                        medianos: item.medianos,
                        grandes: item.grandes,
                        exonerados: item.exonerados || []
                    });
                    resumen.totalP += item.pequenos;
                    resumen.totalM += item.medianos;
                    resumen.totalG += item.grandes;
                    resumen.totalExonerados += exoTotal;
                    resumen.costoExonerados += exoCosto;
                }
            });
            return resumen;
        }

        function obtenerTipoClienteRecogida(recogida) {
            if (!recogida) return 'comunidad';
            const comercios = ['Abasto el Llanero', 'Distribuidora Caridad', 'Queseras'];
            const galpones = ['Galpón'];
            if (comercios.includes(recogida.comunidad)) return 'comercio';
            if (galpones.includes(recogida.comunidad)) return 'galpon';
            return 'comunidad';
        }

        // ============================================================
        // GENERADORES DE REPORTES (existentes + nuevo)
        // ============================================================

        function generarReporteExoneradosDetalle(datos) {
            const cargas = datos.cargas || [];
            let exonerados = [];
            
            cargas.forEach(c => {
                c.items.forEach(item => {
                    if (item.exonerados && item.exonerados.length > 0) {
                        const recogida = datos.recogidas.find(r => r.id === item.recogidaId);
                        const comunidad = recogida ? recogida.comunidad : 'Desconocida';
                        item.exonerados.forEach(ex => {
                            exonerados.push({
                                cargaId: c.id,
                                fecha: c.fecha,
                                planta: c.planta,
                                comunidad: comunidad,
                                destino: ex.destino || 'comunidad',
                                institucion: ex.institucion || '',
                                pequenos: ex.pequenos || 0,
                                medianos: ex.medianos || 0,
                                grandes: ex.grandes || 0,
                                costo: ex.costo || 0
                            });
                        });
                    }
                });
            });

            // También incluir exoneraciones de entregas que no pasaron por carga (si las hay)
            const entregas = datos.entregas || [];
            entregas.forEach(e => {
                if (e.exonerados && e.exonerados.length > 0) {
                    e.exonerados.forEach(ex => {
                        // Verificar si ya está incluido desde una carga
                        const existe = exonerados.some(ex2 => 
                            ex2.comunidad === e.comunidad && 
                            ex2.institucion === ex.institucion &&
                            new Date(ex2.fecha).toDateString() === new Date(e.fecha).toDateString()
                        );
                        if (!existe) {
                            exonerados.push({
                                cargaId: null,
                                fecha: e.fecha,
                                planta: e.planta || '',
                                comunidad: e.comunidad,
                                destino: ex.destino || 'comunidad',
                                institucion: ex.institucion || '',
                                pequenos: ex.pequenos || 0,
                                medianos: ex.medianos || 0,
                                grandes: ex.grandes || 0,
                                costo: ex.costo || 0
                            });
                        }
                    });
                }
            });

            if (exonerados.length === 0) return '<p style="color:#999;">No hay exoneraciones registradas.</p>';

            let html = `
                <h4>🎓 Detalle de exoneraciones</h4>
                <p style="font-size:13px; color:#666; margin-bottom:8px;">
                    Total de exoneraciones: <strong>${exonerados.length}</strong> | 
                    Costo total: <strong>$${exonerados.reduce((sum, ex) => sum + ex.costo, 0).toFixed(2)}</strong> |
                    Cilindros exonerados: <strong>${exonerados.reduce((sum, ex) => sum + ex.pequenos + ex.medianos + ex.grandes, 0)}</strong>
                </p>
                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <thead>
                        <tr style="background:#0d47a1; color:white;">
                            <th style="padding:6px; border:1px solid #ddd;">Fecha</th>
                            <th style="padding:6px; border:1px solid #ddd;">Comunidad</th>
                            <th style="padding:6px; border:1px solid #ddd;">Institución</th>
                            <th style="padding:6px; border:1px solid #ddd;">P</th>
                            <th style="padding:6px; border:1px solid #ddd;">M</th>
                            <th style="padding:6px; border:1px solid #ddd;">G</th>
                            <th style="padding:6px; border:1px solid #ddd;">Costo $</th>
                            <th style="padding:6px; border:1px solid #ddd;">Carga</th>
                        </tr>
                    </thead>
                    <tbody>`;

            let totalCosto = 0;
            let totalCilindros = 0;
            exonerados.sort((a, b) => new Date(a.fecha) - new Date(b.fecha)).forEach(ex => {
                const fecha = new Date(ex.fecha).toLocaleDateString();
                const totalEx = ex.pequenos + ex.medianos + ex.grandes;
                totalCosto += ex.costo;
                totalCilindros += totalEx;
                const cargaLabel = ex.cargaId ? `#${ex.cargaId}` : 'Directa';
                const plantaNombre = obtenerNombrePlanta(ex.planta);
                html += `<tr>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${fecha}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${ex.comunidad}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${ex.institucion}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${ex.pequenos}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${ex.medianos}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${ex.grandes}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">$${ex.costo.toFixed(2)}</td>
                    <td style="padding:4px 6px; border:1px solid #ddd;">${cargaLabel}</td>
                </tr>`;
            });

            html += `<tr style="background:#e3f2fd; font-weight:bold;">
                <td colspan="2" style="padding:6px; border:1px solid #ddd; text-align:right;">TOTAL</td>
                <td style="padding:6px; border:1px solid #ddd;"></td>
                <td style="padding:6px; border:1px solid #ddd;">${exonerados.reduce((s, e) => s + e.pequenos, 0)}</td>
                <td style="padding:6px; border:1px solid #ddd;">${exonerados.reduce((s, e) => s + e.medianos, 0)}</td>
                <td style="padding:6px; border:1px solid #ddd;">${exonerados.reduce((s, e) => s + e.grandes, 0)}</td>
                <td style="padding:6px; border:1px solid #ddd;">$${totalCosto.toFixed(2)}</td>
                <td style="padding:6px; border:1px solid #ddd;"></td>
            </tr>`;

            html += `</tbody></table>`;
            return html;
        }

        // ============================================================
        // FUNCIÓN PRINCIPAL: cambiarReporte()
        // ============================================================

        function cambiarReporte() {
            const tipo = document.getElementById('tipoReporte').value;
            const datos = obtenerDatos();
            let contenido = '';

            switch(tipo) {
                case 'cargas':
                    contenido = generarReporteCargas(datos);
                    break;
                case 'inventario':
                    contenido = generarReporteInventario(datos);
                    break;
                case 'exonerados':
                    contenido = generarReporteExonerados(datos);
                    break;
                case 'ventas':
                    contenido = generarReporteVentas(datos);
                    break;
                case 'gastos':
                    contenido = generarReporteGastos(datos);
                    break;
                case 'mensual':
                    contenido = generarReporteMensual(datos);
                    break;
                case 'historial_comunidad':
                    const comunidades = obtenerComunidades();
                    if (comunidades.length === 0) {
                        contenido = '<p style="color:#999;">No hay comunidades registradas.</p>';
                    } else {
                        const selectHTML = `
                            <div style="margin-bottom:12px;">
                                <label for="selectComunidad">Selecciona una comunidad:</label>
                                <select id="selectComunidad" onchange="cargarHistorialComunidad()" style="width:100%; padding:10px; margin-top:4px;">
                                    <option value="">-- Seleccionar --</option>
                                    ${comunidades.map(c => `<option value="${c}">${c}</option>`).join('')}
                                </select>
                            </div>
                            <div id="historialComunidadResultado"></div>
                        `;
                        contenido = selectHTML;
                    }
                    break;
                case 'cargas_detalle':
                    contenido = generarReporteCargasDetalle(datos);
                    break;
                case 'resumen_comunidades':
                    contenido = generarResumenComunidades(datos);
                    break;
                case 'exonerados_detalle':
                    contenido = generarReporteExoneradosDetalle(datos);
                    break;
                default:
                    contenido = '<p>Selecciona un tipo de reporte</p>';
            }

            document.getElementById('reporteContenido').innerHTML = contenido;
            if (tipo === 'historial_comunidad') {
                const select = document.getElementById('selectComunidad');
                if (select && select.value) {
                    cargarHistorialComunidad();
                }
            }
        }

        function cargarHistorialComunidad() {
            const select = document.getElementById('selectComunidad');
            const comunidad = select ? select.value : '';
            if (!comunidad) {
                document.getElementById('historialComunidadResultado').innerHTML = '<p style="color:#999;">Selecciona una comunidad.</p>';
                return;
            }
            const datos = obtenerDatos();
            const contenido = generarHistorialComunidad(datos, comunidad);
            document.getElementById('historialComunidadResultado').innerHTML = contenido;
        }

        // ============================================================
        // LOS DEMÁS GENERADORES DE REPORTES (ya existentes)
        // ============================================================
        // Nota: Mantén tus funciones existentes para los demás reportes.
        // Aquí solo incluimos las nuevas.

        // ============================================================
        // EXPORTAR EXCEL Y PDF (con nueva opción)
        // ============================================================

        function generarExcel() {
            const tipo = document.getElementById('tipoReporte').value;
            const datos = obtenerDatos();
            let datosExcel = [];

            switch(tipo) {
                // ... (casos existentes)
                case 'exonerados_detalle':
                    const cargas = datos.cargas || [];
                    cargas.forEach(c => {
                        c.items.forEach(item => {
                            if (item.exonerados && item.exonerados.length > 0) {
                                const recogida = datos.recogidas.find(r => r.id === item.recogidaId);
                                const comunidad = recogida ? recogida.comunidad : 'Desconocida';
                                item.exonerados.forEach(ex => {
                                    datosExcel.push({
                                        'Fecha': new Date(c.fecha).toLocaleDateString(),
                                        'Comunidad': comunidad,
                                        'Institución': ex.institucion || '',
                                        'Pequeños': ex.pequenos || 0,
                                        'Medianos': ex.medianos || 0,
                                        'Grandes': ex.grandes || 0,
                                        'Costo $': (ex.costo || 0).toFixed(2),
                                        'Carga': `#${c.id}`
                                    });
                                });
                            }
                        });
                    });
                    if (datosExcel.length === 0) {
                        alert('No hay exoneraciones para exportar.');
                        return;
                    }
                    break;
                default:
                    alert('Tipo de reporte no soportado para Excel.');
                    return;
            }

            if (datosExcel.length === 0) {
                alert('No hay datos para exportar.');
                return;
            }

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(datosExcel);
            XLSX.utils.book_append_sheet(wb, ws, "Reporte");
            const filename = `Reporte_GAS_GUARIBE_${tipo}_${new Date().toISOString().slice(0,10)}.xlsx`;
            XLSX.writeFile(wb, filename);
        }

        function generarPDF() {
            const tipo = document.getElementById('tipoReporte').value;
            const contenido = document.getElementById('reporteResultado');
            if (!contenido || contenido.textContent.trim() === '') {
                alert('No hay datos para exportar.');
                return;
            }

            const nombre = tipo.charAt(0).toUpperCase() + tipo.slice(1);
            
            const clon = contenido.cloneNode(true);
            
            const tempDiv = document.createElement('div');
            tempDiv.style.padding = '20px';
            tempDiv.style.fontFamily = 'Arial, sans-serif';
            tempDiv.style.maxWidth = '800px';
            tempDiv.style.margin = '0 auto';
            tempDiv.innerHTML = `
                <h1 style="color:#0d47a1;">GAS GUARIBE</h1>
                <h2>Reporte: ${nombre}</h2>
                <p style="color:#666;">Fecha: ${new Date().toLocaleString()}</p>
                <hr>
                ${clon.innerHTML}
                <hr>
                <p style="color:#999; font-size:12px;">Generado por GAS GUARIBE v2.1</p>
            `;
            
            document.body.appendChild(tempDiv);
            
            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:      `Reporte_GAS_GUARIBE_${tipo}_${new Date().toISOString().slice(0,10)}.pdf`,
                image:         { type: 'jpeg', quality: 0.98 },
                html2canvas:   { scale: 2, letterRendering: true, useCORS: true, logging: false },
                jsPDF:         { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(tempDiv).save().then(function() {
                document.body.removeChild(tempDiv);
            }).catch(function(err) {
                console.error('Error PDF:', err);
                alert('Error al generar el PDF. Intenta de nuevo.');
                document.body.removeChild(tempDiv);
            });
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================

        document.addEventListener('DOMContentLoaded', function() {
            cambiarReporte();
        });
    </script>
</body>
</html>
