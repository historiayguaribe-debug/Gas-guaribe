<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Registrar entrega - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Registrar entrega</h1>
            <a href="index.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <form id="formEntrega">
            <div class="form-group">
                <label for="comunidad">Comunidad o cliente</label>
                <input type="text" id="comunidad" list="listaComunidades" placeholder="Escribe o selecciona" required>
                <datalist id="listaComunidades"></datalist>
            </div>

            <div class="form-group">
                <label>Tipo de cliente</label>
                <div id="tipoClienteDisplay" style="padding:8px; background:#e3f2fd; border-radius:8px; font-weight:500; color:#0d47a1;">
                    🏘️ Comunidad
                </div>
                <input type="hidden" id="tipoCliente" value="comunidad">
            </div>

            <div class="form-group">
                <label for="planta">Planta de llenado</label>
                <select id="planta" required>
                    <option value="">Selecciona una planta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cargaOrigen">Carga de origen (opcional)</label>
                <select id="cargaOrigen" onchange="precargarExoneradosDesdeCarga()">
                    <option value="">Selecciona una carga para precargar exoneraciones</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cilindros entregados</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Pequeños</label>
                        <input type="number" id="pequenos" min="0" value="0" oninput="actualizarTotales()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Medianos</label>
                        <input type="number" id="medianos" min="0" value="0" oninput="actualizarTotales()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Grandes</label>
                        <input type="number" id="grandes" min="0" value="0" oninput="actualizarTotales()">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Precios aplicados (por cilindro)</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Pequeño $</label>
                        <input type="number" id="precio_pequeno" step="0.01" value="3.50" oninput="actualizarTotales()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Mediano $</label>
                        <input type="number" id="precio_mediano" step="0.01" value="5.00" oninput="actualizarTotales()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Grande $</label>
                        <input type="number" id="precio_grande" step="0.01" value="7.50" oninput="actualizarTotales()">
                    </div>
                </div>
            </div>

            <div class="form-group" style="border-top:2px solid #ddd; padding-top:12px;">
                <label style="font-weight:700;">🎓 Exonerados</label>
                <div id="exoneradosPrecargados" style="margin-bottom:8px;"></div>
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;">
                    <div style="flex:1; min-width:120px;">
                        <label style="font-size:12px;">Destino</label>
                        <select id="exo_destino" style="padding:8px;">
                            <option value="comunidad">Comunidad</option>
                            <option value="galpon">Galpón</option>
                        </select>
                    </div>
                    <div style="flex:2; min-width:150px;">
                        <label style="font-size:12px;">Institución</label>
                        <input type="text" id="exo_institucion" placeholder="Nombre de la institución" style="padding:8px;">
                    </div>
                    <div style="flex:1; min-width:60px;">
                        <label style="font-size:12px;">P</label>
                        <input type="number" id="exo_pequenos" min="0" value="0" style="padding:8px; width:100%;">
                    </div>
                    <div style="flex:1; min-width:60px;">
                        <label style="font-size:12px;">M</label>
                        <input type="number" id="exo_medianos" min="0" value="0" style="padding:8px; width:100%;">
                    </div>
                    <div style="flex:1; min-width:60px;">
                        <label style="font-size:12px;">G</label>
                        <input type="number" id="exo_grandes" min="0" value="0" style="padding:8px; width:100%;">
                    </div>
                    <div style="flex:0 0 auto; display:flex; align-items:flex-end;">
                        <button type="button" class="btn-secondary" style="padding:8px 16px; margin:0;" onclick="agregarExonerado()">+</button>
                    </div>
                </div>
                <div id="listaExonerados" style="margin-top:8px; font-size:13px;"></div>
            </div>

            <div class="form-group" style="border-top:2px solid #ddd; padding-top:12px;">
                <label style="font-weight:700;">💵 Pago recibido</label>
                <div style="display:flex; gap:8px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Efectivo $</label>
                        <input type="number" id="pago_efectivo" step="0.01" min="0" value="0" oninput="actualizarTotales()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Transferencia $</label>
                        <input type="number" id="pago_transferencia" step="0.01" min="0" value="0" oninput="actualizarTotales()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Punto de venta $</label>
                        <input type="number" id="pago_punto_venta" step="0.01" min="0" value="0" oninput="actualizarTotales()">
                    </div>
                </div>
                <div id="resumenPago" class="subtotal-box">
                    Total a pagar: $0.00 | Recibido: $0.00 | Pendiente: $0.00
                </div>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha">
            </div>

            <input type="hidden" id="editId" value="">
            <input type="hidden" id="exoneradosData" value="[]">
            <button type="submit" class="btn-primary" id="btnGuardar">Guardar entrega</button>
            <button type="button" class="btn-danger" id="btnEliminar" style="display:none;">Eliminar</button>
        </form>

        <div id="mensaje" style="margin-top:16px; padding:12px; border-radius:8px; display:none;"></div>
    </div>

    <script>
        let exoneradosList = [];

        function cargarComunidades() {
            const comunidades = obtenerComunidades();
            const datalist = document.getElementById('listaComunidades');
            datalist.innerHTML = '';
            comunidades.forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                datalist.appendChild(option);
            });
        }

        function cargarPlantas() {
            const plantas = obtenerPlantas();
            const select = document.getElementById('planta');
            select.innerHTML = '<option value="">Selecciona una planta</option>';
            plantas.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.nombre;
                select.appendChild(option);
            });
        }

        function cargarCargas() {
            cargarDatos();
            const cargas = datos.cargas.filter(c => c.estado === 'completada');
            const select = document.getElementById('cargaOrigen');
            select.innerHTML = '<option value="">Selecciona una carga para precargar exoneraciones</option>';
            cargas.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                const fecha = new Date(c.fecha).toLocaleDateString();
                const resumen = obtenerResumenCarga(c.id);
                const total = resumen ? resumen.totalP + resumen.totalM + resumen.totalG : 0;
                option.textContent = `Carga #${c.id} - ${fecha} (${total} cilindros)`;
                select.appendChild(option);
            });
        }

        function precargarExoneradosDesdeCarga() {
            const cargaId = parseInt(document.getElementById('cargaOrigen').value);
            if (!cargaId) return;

            cargarDatos();
            const carga = datos.cargas.find(c => c.id === cargaId);
            if (!carga) return;

            let exonerados = [];
            carga.items.forEach(item => {
                if (item.exonerados && item.exonerados.length > 0) {
                    const recogida = datos.recogidas.find(r => r.id === item.recogidaId);
                    const comunidadSeleccionada = document.getElementById('comunidad').value.trim();
                    if (recogida && recogida.comunidad === comunidadSeleccionada) {
                        exonerados = exonerados.concat(item.exonerados);
                    }
                }
            });

            if (exonerados.length > 0) {
                exoneradosList = exonerados;
                document.getElementById('exoneradosData').value = JSON.stringify(exoneradosList);
                renderExonerados();
                mostrarMensaje(`✅ Se precargaron ${exonerados.length} exoneraciones desde la carga`, 'exito');
            } else {
                mostrarMensaje('⚠️ No hay exoneraciones para esta comunidad en la carga seleccionada', 'error');
            }
        }

        function actualizarTotales() {
            const p = parseInt(document.getElementById('pequenos').value) || 0;
            const m = parseInt(document.getElementById('medianos').value) || 0;
            const g = parseInt(document.getElementById('grandes').value) || 0;
            const precioP = parseFloat(document.getElementById('precio_pequeno').value) || 0;
            const precioM = parseFloat(document.getElementById('precio_mediano').value) || 0;
            const precioG = parseFloat(document.getElementById('precio_grande').value) || 0;
            const total = (p * precioP) + (m * precioM) + (g * precioG);
            
            const ef = parseFloat(document.getElementById('pago_efectivo').value) || 0;
            const tf = parseFloat(document.getElementById('pago_transferencia').value) || 0;
            const pv = parseFloat(document.getElementById('pago_punto_venta').value) || 0;
            const recibido = ef + tf + pv;
            const pendiente = total - recibido;

            document.getElementById('resumenPago').textContent = 
                `Total a pagar: $${total.toFixed(2)} | Recibido: $${recibido.toFixed(2)} | Pendiente: $${pendiente.toFixed(2)}`;
        }

        function agregarExonerado() {
            const destino = document.getElementById('exo_destino').value;
            const institucion = document.getElementById('exo_institucion').value.trim();
            const pequenos = parseInt(document.getElementById('exo_pequenos').value) || 0;
            const medianos = parseInt(document.getElementById('exo_medianos').value) || 0;
            const grandes = parseInt(document.getElementById('exo_grandes').value) || 0;

            if (pequenos === 0 && medianos === 0 && grandes === 0) {
                mostrarMensaje('Indica al menos un cilindro exonerado', 'error');
                return;
            }
            if (destino === 'comunidad' && !institucion) {
                mostrarMensaje('Indica la institución', 'error');
                return;
            }

            const plantaId = document.getElementById('planta').value;
            const plantas = obtenerPlantas();
            const planta = plantas.find(p => p.id === plantaId);
            const costos = planta ? planta.costos : { pequeno: 0, mediano: 0, grande: 0 };

            const exo = {
                destino: destino,
                institucion: destino === 'comunidad' ? institucion : 'Galpón',
                pequenos,
                medianos,
                grandes,
                costo: (pequenos * costos.pequeno) + (medianos * costos.mediano) + (grandes * costos.grande)
            };

            exoneradosList.push(exo);
            document.getElementById('exoneradosData').value = JSON.stringify(exoneradosList);
            renderExonerados();
            
            document.getElementById('exo_institucion').value = '';
            document.getElementById('exo_pequenos').value = 0;
            document.getElementById('exo_medianos').value = 0;
            document.getElementById('exo_grandes').value = 0;
            mostrarMensaje('✅ Exonerado agregado', 'exito');
        }

        function renderExonerados() {
            const container = document.getElementById('listaExonerados');
            if (exoneradosList.length === 0) {
                container.innerHTML = '<p style="color:#999; font-size:13px;">No hay exonerados registrados</p>';
                return;
            }
            let html = '';
            exoneradosList.forEach((ex, idx) => {
                const destinoLabel = ex.destino === 'comunidad' ? '🏘️' : '🏭';
                html += `<div style="background:#fff3e0; padding:8px; border-radius:6px; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #ff9800;">
                    <span><strong>${destinoLabel} ${ex.institucion}</strong> - P:${ex.pequenos} M:${ex.medianos} G:${ex.grandes} (costo: $${ex.costo.toFixed(2)})</span>
                    <button type="button" onclick="eliminarExonerado(${idx})" style="background:#d32f2f; color:white; border:none; border-radius:4px; padding:4px 8px;">✕</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        function eliminarExonerado(idx) {
            exoneradosList.splice(idx, 1);
            document.getElementById('exoneradosData').value = JSON.stringify(exoneradosList);
            renderExonerados();
        }

        function cargarParaEdicion(id) {
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"entregas":[]}');
            const entrega = datos.entregas.find(e => e.id === id);
            if (!entrega) return;

            document.getElementById('comunidad').value = entrega.comunidad || '';
            document.getElementById('planta').value = entrega.planta || '';
            document.getElementById('pequenos').value = entrega.pequenos || 0;
            document.getElementById('medianos').value = entrega.medianos || 0;
            document.getElementById('grandes').value = entrega.grandes || 0;
            document.getElementById('precio_pequeno').value = entrega.precios?.pequeno || 3.50;
            document.getElementById('precio_mediano').value = entrega.precios?.mediano || 5.00;
            document.getElementById('precio_grande').value = entrega.precios?.grande || 7.50;
            document.getElementById('pago_efectivo').value = entrega.pago_efectivo || 0;
            document.getElementById('pago_transferencia').value = entrega.pago_transferencia || 0;
            document.getElementById('pago_punto_venta').value = entrega.pago_punto_venta || 0;
            document.getElementById('fecha').value = entrega.fecha ? new Date(entrega.fecha).toISOString().slice(0,10) : '';
            document.getElementById('editId').value = entrega.id;
            document.getElementById('btnGuardar').textContent = 'Actualizar entrega';
            document.getElementById('btnEliminar').style.display = 'block';

            if (entrega.exonerados) {
                exoneradosList = entrega.exonerados;
                document.getElementById('exoneradosData').value = JSON.stringify(exoneradosList);
                renderExonerados();
            }

            actualizarTipoCliente();
            actualizarTotales();
        }

        function inferirTipoCliente(comunidad) {
            if (!comunidad) return 'comunidad';
            const comercios = ['Abasto el Llanero', 'Distribuidora Caridad', 'Queseras'];
            const galpones = ['Galpón'];
            if (comercios.includes(comunidad)) return 'comercio';
            if (galpones.includes(comunidad)) return 'galpon';
            return 'comunidad';
        }

        function actualizarTipoCliente() {
            const comunidad = document.getElementById('comunidad').value.trim();
            const tipo = inferirTipoCliente(comunidad);
            document.getElementById('tipoCliente').value = tipo;
            const display = document.getElementById('tipoClienteDisplay');
            const iconos = { comunidad: '🏘️', comercio: '🏪', galpon: '🏭' };
            const nombres = { comunidad: 'Comunidad', comercio: 'Comercio', galpon: 'Galpón' };
            display.textContent = `${iconos[tipo] || '🏘️'} ${nombres[tipo] || 'Comunidad'}`;
            actualizarPreciosPorTipo(tipo);
        }

        function actualizarPreciosPorTipo(tipo) {
            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"config":{"precios_venta":{}}}');
            const precios = datos.config?.precios_venta || {
                comunidad: { pequeno: 3.50, mediano: 5.00, grande: 7.50 },
                comercio: { pequeno: 3.00, mediano: 4.50, grande: 6.50 },
                galpon: { pequeno: 2.50, mediano: 3.80, grande: 5.20 }
            };
            const preciosTipo = precios[tipo] || precios.comunidad;
            document.getElementById('precio_pequeno').value = preciosTipo.pequeno || 0;
            document.getElementById('precio_mediano').value = preciosTipo.mediano || 0;
            document.getElementById('precio_grande').value = preciosTipo.grande || 0;
            actualizarTotales();
        }

        document.addEventListener('DOMContentLoaded', function() {
            cargarComunidades();
            cargarPlantas();
            cargarCargas();
            if (!document.getElementById('fecha').value) {
                document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
            }
            actualizarTotales();

            document.getElementById('comunidad').addEventListener('input', actualizarTipoCliente);
            document.getElementById('comunidad').addEventListener('change', actualizarTipoCliente);

            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            if (editId) {
                cargarParaEdicion(parseInt(editId));
            }
        });

        document.getElementById('formEntrega').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('editId').value);
            const comunidad = document.getElementById('comunidad').value.trim();
            const planta = document.getElementById('planta').value;
            const pequenos = parseInt(document.getElementById('pequenos').value) || 0;
            const medianos = parseInt(document.getElementById('medianos').value) || 0;
            const grandes = parseInt(document.getElementById('grandes').value) || 0;
            const precios = {
                pequeno: parseFloat(document.getElementById('precio_pequeno').value) || 3.50,
                mediano: parseFloat(document.getElementById('precio_mediano').value) || 5.00,
                grande: parseFloat(document.getElementById('precio_grande').value) || 7.50
            };
            const pago_efectivo = parseFloat(document.getElementById('pago_efectivo').value) || 0;
            const pago_transferencia = parseFloat(document.getElementById('pago_transferencia').value) || 0;
            const pago_punto_venta = parseFloat(document.getElementById('pago_punto_venta').value) || 0;
            const fecha = document.getElementById('fecha').value;
            const exonerados = JSON.parse(document.getElementById('exoneradosData').value || '[]');

            if (!comunidad) {
                mostrarMensaje('Indica la comunidad o cliente', 'error');
                return;
            }
            if (!planta) {
                mostrarMensaje('Selecciona una planta', 'error');
                return;
            }
            if (pequenos === 0 && medianos === 0 && grandes === 0) {
                mostrarMensaje('Debes registrar al menos un cilindro', 'error');
                return;
            }

            agregarComunidad(comunidad);

            const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"entregas":[]}');

            let resultado;
            if (id) {
                const idx = datos.entregas.findIndex(e => e.id === id);
                if (idx !== -1) {
                    datos.entregas[idx] = {
                        ...datos.entregas[idx],
                        comunidad,
                        planta,
                        pequenos,
                        medianos,
                        grandes,
                        precios,
                        pago_efectivo,
                        pago_transferencia,
                        pago_punto_venta,
                        exonerados,
                        fecha: fecha ? new Date(fecha).toISOString() : new Date().toISOString()
                    };
                    resultado = datos.entregas[idx];
                } else {
                    resultado = null;
                }
            } else {
                const nuevaEntrega = {
                    id: Date.now(),
                    comunidad,
                    planta,
                    pequenos,
                    medianos,
                    grandes,
                    precios,
                    pago_efectivo,
                    pago_transferencia,
                    pago_punto_venta,
                    exonerados,
                    fecha: fecha ? new Date(fecha).toISOString() : new Date().toISOString(),
                    estado: 'entregado'
                };
                datos.entregas.push(nuevaEntrega);
                resultado = nuevaEntrega;
            }

            if (resultado) {
                localStorage.setItem('gasguaribe_datos_v2', JSON.stringify(datos));
                if (!id) {
                    setUltimo('entrega', resultado.id);
                }
                const total = (pequenos * precios.pequeno) + (medianos * precios.mediano) + (grandes * precios.grande);
                mostrarMensaje(`✅ ${id ? 'Entrega actualizada' : 'Entrega guardada'}: ${comunidad} - $${total.toFixed(2)}`, 'exito');
                if (!id) {
                    document.getElementById('formEntrega').reset();
                    document.getElementById('editId').value = '';
                    document.getElementById('btnGuardar').textContent = 'Guardar entrega';
                    document.getElementById('btnEliminar').style.display = 'none';
                    document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
                    exoneradosList = [];
                    document.getElementById('exoneradosData').value = '[]';
                    renderExonerados();
                    actualizarTotales();
                    cargarComunidades();
                    cargarCargas();
                }
            } else {
                mostrarMensaje('❌ Error al guardar', 'error');
            }
        });

        document.getElementById('btnEliminar').addEventListener('click', function() {
            const id = parseInt(document.getElementById('editId').value);
            if (!id) return;
            if (confirm('¿Eliminar esta entrega?')) {
                const datos = JSON.parse(localStorage.getItem('gasguaribe_datos_v2') || '{"entregas":[]}');
                datos.entregas = datos.entregas.filter(e => e.id !== id);
                localStorage.setItem('gasguaribe_datos_v2', JSON.stringify(datos));
                mostrarMensaje('🗑️ Entrega eliminada', 'exito');
                document.getElementById('formEntrega').reset();
                document.getElementById('editId').value = '';
                document.getElementById('btnGuardar').textContent = 'Guardar entrega';
                document.getElementById('btnEliminar').style.display = 'none';
                document.getElementById('fecha').value = new Date().toISOString().slice(0,10);
                exoneradosList = [];
                document.getElementById('exoneradosData').value = '[]';
                renderExonerados();
                actualizarTotales();
            }
        });

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.style.display = 'block';
            msg.style.backgroundColor = tipo === 'exito' ? '#d4edda' : '#f8d7da';
            msg.style.color = tipo === 'exito' ? '#155724' : '#721c24';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
