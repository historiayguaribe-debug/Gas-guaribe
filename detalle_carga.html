<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Detalle de carga - GAS GUARIBE</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚛 Detalle de carga</h1>
            <a href="cargas.html" style="color:#0d47a1; text-decoration:none;">← Volver</a>
        </header>

        <div id="detalleCarga"></div>
    </div>

    <script>
        function cargarDetalle() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id'));
            if (!id) {
                document.getElementById('detalleCarga').innerHTML = '<p style="color:#999;">Carga no encontrada</p>';
                return;
            }

            cargarDatos();
            const carga = datos.cargas.find(c => c.id === id);
            if (!carga) {
                document.getElementById('detalleCarga').innerHTML = '<p style="color:#999;">Carga no encontrada</p>';
                return;
            }

            const fecha = new Date(carga.fecha).toLocaleDateString();
            const plantaNombre = obtenerNombrePlanta(carga.planta);
            const resumen = obtenerResumenCarga(id);
            const total = resumen ? resumen.totalP + resumen.totalM + resumen.totalG : 0;

            let html = `
                <div style="background:#e3f2fd; padding:16px; border-radius:8px; margin-bottom:16px;">
                    <h3>Carga #${id}</h3>
                    <p><strong>Planta:</strong> ${plantaNombre}</p>
                    <p><strong>Fecha:</strong> ${fecha}</p>
                    <p><strong>Total cilindros:</strong> ${total}</p>
                    <p><strong>Estado:</strong> ${carga.estado === 'activa' ? '🟢 Activa' : '✅ Completada'}</p>
                </div>
                <h4>Desglose por comunidad</h4>
                <table style="width:100%; border-collapse:collapse; font-size:14px;">
                    <thead>
                        <tr style="background:#0d47a1; color:white;">
                            <th style="padding:8px; border:1px solid #ddd;">Comunidad</th>
                            <th style="padding:8px; border:1px solid #ddd;">P</th>
                            <th style="padding:8px; border:1px solid #ddd;">M</th>
                            <th style="padding:8px; border:1px solid #ddd;">G</th>
                            <th style="padding:8px; border:1px solid #ddd;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let totalP = 0, totalM = 0, totalG = 0;
            carga.items.forEach(item => {
                const recogida = datos.recogidas.find(r => r.id === item.recogidaId);
                const comunidad = recogida ? recogida.comunidad : 'Desconocida';
                const p = item.pequenos || 0;
                const m = item.medianos || 0;
                const g = item.grandes || 0;
                totalP += p;
                totalM += m;
                totalG += g;
                html += `
                    <tr>
                        <td style="padding:6px; border:1px solid #ddd;">${comunidad}</td>
                        <td style="padding:6px; border:1px solid #ddd;">${p}</td>
                        <td style="padding:6px; border:1px solid #ddd;">${m}</td>
                        <td style="padding:6px; border:1px solid #ddd;">${g}</td>
                        <td style="padding:6px; border:1px solid #ddd;"><strong>${p + m + g}</strong></td>
                    </tr>
                `;
            });

            html += `
                    <tr style="background:#e3f2fd; font-weight:bold;">
                        <td style="padding:8px; border:1px solid #ddd;">TOTAL</td>
                        <td style="padding:8px; border:1px solid #ddd;">${totalP}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${totalM}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${totalG}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${totalP + totalM + totalG}</td>
                    </tr>
                </tbody></table>
            `;

            // Si la carga está activa, permitir marcar como completada
            if (carga.estado === 'activa') {
                html += `
                    <button class="btn-primary" style="margin-top:16px;" onclick="completarCarga(${id})">✅ Marcar como completada</button>
                `;
            }

            document.getElementById('detalleCarga').innerHTML = html;
        }

        function completarCarga(id) {
            if (confirm('¿Marcar esta carga como completada? Las recogidas se actualizarán automáticamente.')) {
                actualizarCarga(id, { estado: 'completada' });
                mostrarMensaje('✅ Carga completada', 'exito');
                cargarDetalle();
                if (window.opener) window.opener.actualizarDashboard();
            }
        }

        function mostrarMensaje(texto, tipo) {
            const msg = document.createElement('div');
            msg.textContent = texto;
            msg.style.padding = '12px';
            msg.style.borderRadius = '8px';
            msg.style.backgroundColor = tipo === 'exito' ? '#d4edda' : '#f8d7da';
            msg.style.color = tipo === 'exito' ? '#155724' : '#721c24';
            msg.style.marginTop = '16px';
            document.getElementById('detalleCarga').appendChild(msg);
            setTimeout(() => { msg.remove(); }, 4000);
        }

        document.addEventListener('DOMContentLoaded', cargarDetalle);
    </script>
</body>
</html>
